<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {

html, body { background: var(--cream); color: var(--text); font-family: var(--sans); font-weight: 400; line-height: 1.7; -webkit-font-smoothing: antialiased; min-height: 100vh; }

/* TOPBAR */
.topbar { background: var(--warm-brown); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 16px; flex-wrap: wrap; }

.topbar-tab:hover { background: rgba(245, 232, 218, 0.1); color: var(--cream); }
.topbar-tab.active { background: var(--terracotta); color: #fff; }
.topbar-badge { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(245, 232, 218, 0.7); padding: 4px 12px; border: 1px solid rgba(245, 232, 218, 0.25); border-radius: 100px; }

.body-wrap { display: grid; grid-template-columns: 300px 1fr; min-height: calc(100vh - 50px); }

/* SIDEBAR */
.sidebar { background: linear-gradient(180deg, var(--sand) 0%, var(--peach) 100%); border-right: 1px solid var(--border-strong); padding: 24px 18px; height: calc(100vh - 50px); overflow-y: auto; position: sticky; top: 50px; }
.search-row { position: relative; margin-bottom: 16px; }
.search-box { width: 100%; background: rgba(255, 255, 255, 0.8); border: 1px solid var(--border-strong); border-radius: 8px; padding: 11px 14px 11px 38px; font-family: var(--sans); font-size: 13px; color: var(--text); transition: all 150ms; }

.cluster-name:first-of-type { margin-top: 0; }
.doc-link { display: flex; flex-direction: column; gap: 3px; padding: 10px 12px; font-size: 13px; color: var(--text); text-decoration: none; border-radius: 8px; cursor: pointer; margin-bottom: 3px; transition: all 100ms; line-height: 1.35; }

.doc-link.active { background: var(--terracotta); color: #fff; font-weight: 500; }

.doc-link-meta { font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--text-soft); opacity: 0.7; }
.doc-link.active .doc-link-meta { color: rgba(255,255,255,0.85); }

/* MAIN */
.main { padding: 48px 64px 96px; max-width: 880px; }
.breadcrumb { font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--copper); margin-bottom: 14px; }
.doc-title { font-family: var(--display); font-weight: 400; font-size: clamp(36px, 5vw, 54px); line-height: 1.05; letter-spacing: -0.5px; color: var(--warm-brown); margin-bottom: 14px; }
.doc-subtitle { font-family: var(--display); font-style: italic; font-weight: 400; font-size: 22px; line-height: 1.3; color: var(--terra-deep); margin-bottom: 24px; }

.tag { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; padding: 5px 12px; border-radius: 100px; background: rgba(255, 255, 255, 0.6); border: 1px solid var(--border-strong); color: var(--text-soft); }
.tag.phase { background: var(--terracotta); color: #fff; border-color: var(--terracotta); }

.content h2 { font-family: var(--display); font-weight: 500; font-size: clamp(24px, 2.6vw, 30px); color: var(--terra-deep); margin: 38px 0 12px; letter-spacing: -0.2px; }
.content h3 { font-family: var(--sans); font-weight: 600; font-size: 15px; color: var(--copper); margin: 26px 0 10px; letter-spacing: 0.5px; text-transform: uppercase; }

.content em { color: var(--text-soft); font-style: italic; }
.content blockquote { font-family: var(--display); font-style: italic; font-size: 22px; line-height: 1.4; border-left: 3px solid var(--terracotta); padding: 12px 0 12px 22px; margin: 28px 0; color: var(--terra-deep); }

/* SIDEBAR CALLOUT BOX */

.content .callout p:last-child { margin-bottom: 0; }

.cta-bottom { background: linear-gradient(135deg, var(--terracotta) 0%, var(--copper) 100%); color: #fff; padding: 38px 42px; border-radius: 16px; margin: 54px 0 12px; box-shadow: 0 8px 32px rgba(184, 100, 63, 0.25); }
.cta-bottom .cta-lead { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.85); margin-bottom: 10px; }

.cta-bottom p { font-size: 15px; line-height: 1.6; color: rgba(255, 255, 255, 0.92); margin: 0 0 22px; }
.cta-bottom a.cta-btn { display: inline-block; background: var(--cream); color: var(--warm-brown); padding: 13px 28px; border-radius: 100px; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; text-decoration: none; transition: all 150ms; }
.cta-bottom a.cta-btn:hover { background: #fff; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,0,0,0.2); }

/* QUIZ MODE */
.mode-toggle { display: flex; gap: 4px; background: rgba(255, 255, 255, 0.5); border: 1px solid var(--border-strong); border-radius: 100px; padding: 3px; margin-bottom: 24px; width: fit-content; }
.mode-btn { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-soft); background: none; border: none; padding: 7px 16px; border-radius: 100px; cursor: pointer; transition: all 150ms; font-family: var(--sans); }
.mode-btn.active { background: var(--terracotta); color: #fff; }
.quiz-panel { background: rgba(255, 255, 255, 0.7); border: 1px solid var(--border-strong); border-radius: 14px; padding: 34px; margin-top: 24px; }
.quiz-progress { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--copper); margin-bottom: 18px; }
.quiz-question { font-family: var(--display); font-size: 26px; font-weight: 500; color: var(--warm-brown); margin-bottom: 24px; line-height: 1.3; letter-spacing: -0.2px; }
.quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.quiz-option { background: #fff; border: 1.5px solid var(--border-strong); border-radius: 10px; padding: 16px 20px; cursor: pointer; font-size: 15px; color: var(--text); transition: all 150ms; text-align: left; font-family: var(--sans); }
.quiz-option:hover { border-color: var(--terracotta); background: var(--cream); }

.btn:disabled { background: var(--muted); cursor: not-allowed; }
.quiz-actions { display: flex; gap: 10px; justify-content: flex-end; }

.empty-state { text-align: center; padding: 80px 24px; color: var(--muted); }
.empty-state h2 { font-family: var(--display); font-size: 36px; color: var(--terra-deep); margin-bottom: 12px; }


/* KNOWLEDGE QUIZ FEEDBACK */
.quiz-option.correct { border-color: #2D7A4A; background: #D9F0E0; color: #1F5E36; }
.quiz-option.incorrect { border-color: #B83F3F; background: #F5D9D9; color: #7A2A2A; }

.quiz-explanation { background: var(--sand); border-left: 3px solid var(--terracotta); padding: 14px 18px; border-radius: 0 8px 8px 0; font-size: 14px; color: var(--text-soft); margin-bottom: 20px; line-height: 1.6; }

.kn-result-pct { font-family: var(--display); font-size: 84px; font-weight: 400; color: var(--terracotta); line-height: 1; margin-bottom: 6px; }

.kn-result-headline { font-family: var(--display); font-size: 26px; color: var(--warm-brown); margin: 14px 0 8px; }
.kn-result-text { font-size: 15px; line-height: 1.7; color: var(--text); margin-bottom: 14px; }

.kn-breakdown-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--copper); margin-bottom: 14px; }
.kn-cat { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: rgba(255,255,255,0.6); border-radius: 8px; margin-bottom: 8px; font-size: 14px; }
.kn-cat-name { font-weight: 600; color: var(--warm-brown); }
.kn-cat-bar { flex: 1; height: 6px; background: var(--border); border-radius: 100px; margin: 0 16px; overflow: hidden; }
.kn-cat-fill { height: 100%; background: var(--terracotta); border-radius: 100px; }
.kn-cat-pct { font-weight: 600; color: var(--text-soft); min-width: 50px; text-align: right; }
.kn-recommend { background: rgba(255,255,255,0.7); border-left: 3px solid var(--copper); padding: 16px 20px; border-radius: 0 8px 8px 0; margin-top: 20px; font-size: 14px; color: var(--text); }
.kn-recommend strong { color: var(--terra-deep); display: block; margin-bottom: 6px; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; }

/* FIT QUIZ RESULT */
.fit-result { padding: 40px 36px; border-radius: 18px; border: 1px solid var(--border-strong); }
.fit-result.strong { background: linear-gradient(135deg, var(--terracotta) 0%, var(--copper) 100%); color: #fff; }
.fit-result.warm { background: linear-gradient(135deg, var(--cream) 0%, var(--sand) 100%); color: var(--text); }
.fit-result.hold { background: linear-gradient(135deg, var(--cream) 0%, var(--peach) 100%); color: var(--text); }
.fit-result-label { font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 10px; opacity: 0.85; }
.fit-result.strong .fit-result-label { color: rgba(255,255,255,0.85); }
.fit-result-headline { font-family: var(--display); font-size: 38px; font-weight: 500; line-height: 1.1; margin-bottom: 16px; letter-spacing: -0.4px; }
.fit-result.strong .fit-result-headline { color: #fff; }
.fit-result.warm .fit-result-headline, .fit-result.hold .fit-result-headline { color: var(--warm-brown); }
.fit-result-text { font-size: 15px; line-height: 1.65; margin-bottom: 24px; }
.fit-result.strong .fit-result-text { color: rgba(255,255,255,0.92); }
.fit-result-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.fit-result .btn.primary-cta { background: var(--cream); color: var(--warm-brown); }
.fit-result .btn.primary-cta:hover { background: #fff; }

<script id="docs-data" type="application/json">[{"id": "welcome", "library": "Start Here", "cluster": "Welcome", "title": "Welcome to Foundations", "subtitle": "If you are here, you have figured out that your body has stopped working the way it used to. This is the map for what to do about it.", "phase": "Welcome", "readTime": 3, "content": "\nYou are in the right place if any of this sounds familiar.\n\nYou feel drained even when you sleep. Your weight will not budge no matter what you change. Your cycles are unpredictable or symptomatic. Your gut argues with everything you eat. Your labs come back \"within range\" while everything feels off.\n\nMost of the people inside this library have already done a lot. You have tried elimination diets. You have tried trainers. You have tried supplements your favorite influencer recommended. You have sat across from doctors who said your bloodwork was fine and offered an SSRI or a different birth control or a \"let's just see how you feel in six months.\"\n\nThat gap, between what your labs say and what your body says, is the gap this library was built to close.\n\n## What This Library Is\n\nWesnoski Foundations is the framework Coach Farren Brown uses to rebuild the system underneath chronic symptoms. It is called the MARCH Method. We will explain it from the ground up over the next several docs.\n\nYou will learn:\n\n- Why most symptoms have an upstream cause that conventional medicine misses\n- Why sequencing matters more than supplementing\n- What functional labs actually show that standard labs do not\n- What a real recovery arc looks like when the work is done in the right order\n- How to find your phase so you know what to focus on first\n\nThis is not medical advice. This is the framework that informs the case work we do with 1:1 clients. Reading this library will not replace having a coach. It will help you understand what your body is doing and what good would look like.\n\n## How To Use It\n\nStart with the MARCH Method doc. Then take the Phase Quiz to find out which phase your case likely lives in. From there, navigate to the section that matches your strongest symptom cluster.\n\nThe goal of this library is clarity. If you read three or four docs and you feel like the framework fits but you do not know exactly where to start, that is the signal that 1:1 coaching makes sense. Every doc has an Apply link at the bottom. The discovery call is the only way in.\n"}, {"id": "march", "library": "Start Here", "cluster": "Framework", "title": "The MARCH Method", "subtitle": "Five phases. One at a time. In order.", "phase": "MARCH", "readTime": 6, "content": "\nMost people who land here have already had the kitchen sink thrown at them. A supplement here. A training plan there. Hormones, peptides, meal plans, all stacked at once. Almost none of it landed because the foundation underneath was broken.\n\nThe MARCH Method is the sequenced approach Coach Farren uses to rebuild the system. Five phases, in this order, for a reason.\n\n## M is Mitochondria\n\nThe energy floor under every cell in your body. If your cells cannot make power, nothing else has fuel to work.\n\nSymptoms in this phase: tired after a full night of sleep, foggy in the morning, dependent on caffeine, crashing in the afternoon, cold hands and feet, hair thinning, slow recovery from workouts. Many cases land here even when the surface complaint sounds hormonal or metabolic. The cells are out of fuel.\n\nWe rebuild Phase M with iron when ferritin is low, B-complex with the right forms of B12 and folate, CoQ10 ubiquinol, magnesium, sometimes mitochondrial peptides like MOTS-C. We get sleep right. We protect circadian rhythm.\n\n## A is Absorption and Detox\n\nYour gut, your liver, your bile flow. The middle layer that decides whether the nutrients you eat actually reach your cells and whether the byproducts of metabolism actually leave.\n\nSymptoms: bloating, irregular digestion, food sensitivities, reflux, sluggish bowels, brain fog after meals, skin issues, hormonal symptoms that flare with the cycle. You cannot supplement your way out of poor absorption. You cannot hormone-balance your way out of a gut that is leaking.\n\nPhase A is gut repair, bile flow support, Phase 1 and Phase 2 liver detox, and sometimes targeted antimicrobial work for SIBO, candida, parasites, or H. pylori.\n\n## R is Resilience\n\nNervous system, cortisol rhythm, inflammation load. The layer most people skip because it does not feel like a medical problem. It feels like life.\n\nSymptoms: wired but tired, 3 AM wakeups, racing heart at rest, irritability you cannot explain, anxiety with no obvious trigger, mood swings, recovery debt that no amount of sleep clears. Most clients arriving here have lived in survival mode for years. The nervous system has adapted to running hot.\n\nPhase R is cortisol rhythm restoration, sleep architecture rebuild, nervous system regulation, and inflammation reduction. Sometimes adaptogens. Sometimes peptides. Always behavior change.\n\n## C is Cycle and Signal\n\nHormones. Thyroid. Fertility. The full endocrine system.\n\nThis is where most other coaches START. We start here only after M, A, and R are addressed. Anything layered on a broken floor comes undone. Hormones cannot hold their value if the cells cannot use them, the gut cannot break them down, and the nervous system is overriding them.\n\nSymptoms: irregular cycles, PMS that takes you out, low thyroid signal even on medication, low libido, hormonal weight gain, hot flashes, mood swings tied to cycle phase, fertility issues. Phase C is targeted endocrine support: bioidentical progesterone like Progest-E when indicated, thyroid optimization, estrogen detox support, HPG axis restart in some cases.\n\n## H is Healthspan and Strength\n\nBody composition. Lean tissue. Performance. Longevity.\n\nThe natural result of the system working, not the goal we chase. We periodize training, refine nutrition, build muscle, and hold the rebuild you have earned. Phase H is where most fitness programs START. It is also where they fail, because they did not address M, A, R, and C first.\n\n## Why Sequencing Matters\n\nIf you start with Phase C while Phase M is broken, the hormones cannot land. If you start with Phase H while Phase A is leaking, you build on sand. The order is the whole product. The sequencing is what makes the rebuild last.\n\nEvery doc in this library ties back to a phase. Read enough of them and you will start to see your own case map onto the framework.\n"}, {"id": "labs-normal", "library": "Start Here", "cluster": "Framework", "title": "Why Your Labs Look Normal But You Feel Off", "subtitle": "The reference range is not the same as the optimal range.", "phase": "Framework", "readTime": 5, "content": "\nYou have probably had this conversation. You sit across from a doctor and explain that you are exhausted, your weight is not moving, your mood is off, your periods are unpredictable. They run a panel. The results come back. They tell you \"everything looks normal.\"\n\nYou walk out feeling crazy. Because your body is screaming and the lab printout says you are fine.\n\nHere is what is actually happening.\n\n## How Reference Ranges Are Built\n\nStandard lab reference ranges come from a statistical bell curve of the people who got tested at that lab. Most of those people went in because something was wrong. The reference range tells you \"you are not in the worst 2.5% of people who got tested for this.\" It does not tell you \"you are biochemically optimized.\"\n\nA TSH of 4.0 is \"in range.\" It is also a TSH that the functional medicine world considers significantly hypothyroid. A ferritin of 25 is \"in range.\" It is also the ferritin floor at which most women lose their hair, crash their energy, and stop ovulating reliably. A vitamin D of 32 is \"in range.\" It is also a vitamin D level at which immune function and bone density both falter.\n\nThe reference range is built so that doctors do not over-treat. It is not built to optimize you.\n\n## Functional Optimal Ranges\n\nThe Wesnoski case work uses a tighter set of ranges called functional optimal. These are the levels at which most people feel well, perform well, and recover well. They come from years of running labs, watching what changes when those numbers change, and tracking outcomes.\n\nExamples without naming our internal documents:\n\n- TSH: functional optimal is 0.5 to 2.0. Most people start feeling hypothyroid above 2.0 even though the standard range goes to 4.5.\n- Ferritin: functional optimal is 70 to 150 for women, 80 to 150 for men. Many women run at 20 to 40 and feel awful while being \"in range.\"\n- Free T3: most functional practitioners want the upper third of the standard range. The middle is \"fine on paper\" and bad on body.\n- Vitamin D: 60 to 80 ng/mL is the functional target. 32 is not enough for immune function or hormonal conversion.\n- Free Testosterone (women): if you are at the bottom of the range and have low libido, low motivation, low muscle, the lab does not call that low. We do.\n\n## What This Means For You\n\nIf you have ever been told \"your labs look fine\" while you feel awful, you are not crazy. You are likely in the functional gap. Your numbers are passing the lowest bar (you are not catastrophically sick) but failing the highest bar (you are not biochemically thriving).\n\nClosing that gap is what we do. Sometimes with supplementation. Sometimes with diet shifts. Sometimes with stress and sleep work. Sometimes with hormone support. Always with retesting at 6 to 12 weeks to confirm we moved the needle.\n\nIf your bloodwork has been \"fine\" for years while your body has been telling you it is not, the next step is reading a few more docs and then talking to Coach Farren about what a real workup looks like.\n"}, {"id": "phase-quiz", "library": "Start Here", "cluster": "Phase Quiz", "title": "Find Your Phase", "subtitle": "Twenty questions. We will show you where your case likely lives.", "phase": "Quiz", "readTime": 5, "kind": "phase-quiz", "content": ""}, {"id": "phase-quiz-tab", "library": "Quizzes", "cluster": "Find Your Phase", "title": "Find Your Phase", "subtitle": "Twenty questions. We will show you where your case likely lives.", "phase": "Quiz", "readTime": 5, "kind": "phase-quiz", "content": ""}, {"id": "knowledge-quiz", "library": "Quizzes", "cluster": "Test Your Knowledge", "title": "Test Your Knowledge", "subtitle": "Twenty-five questions across the library. See how much of the framework you have internalized.", "phase": "Quiz", "readTime": 8, "kind": "knowledge-quiz", "content": ""}, {"id": "fit-quiz", "library": "Quizzes", "cluster": "Coaching Fit Check", "title": "Are You A Fit For 1:1 Coaching?", "subtitle": "Twelve honest questions. We will tell you if 1:1 is the right next step right now.", "phase": "Quiz", "readTime": 4, "kind": "fit-quiz", "content": ""}, {"id": "energy-tired-8hrs", "library": "Energy", "cluster": "Foundations", "title": "Why You're Tired After 8 Hours of Sleep", "subtitle": "Sleep duration without energy return means the cells, not the schedule, are the problem.", "phase": "M", "readTime": 5, "content": "\nYou sleep 8 hours. You wake up exhausted. You drag through the morning. You need caffeine to function. You crash at 2 PM. You go to bed early and the cycle repeats.\n\nIf this is you, the issue is almost never sleep duration. The issue is energy production at the cellular level.\n\n## What Is Actually Happening\n\nEvery cell in your body makes energy through structures called mitochondria. Mitochondria run on raw materials: iron, B vitamins, CoQ10, magnesium, oxygen. When those raw materials are missing or the system that uses them is broken, your cells cannot make enough ATP, the energy currency.\n\nYou wake up after 8 hours of sleep and your battery is at 30%, not 100%. No amount of additional sleep fixes that, because sleep does not refuel the mitochondria. The raw materials and the cellular machinery do.\n\n## What Drains Mitochondria\n\nThe list is long but the common culprits are predictable.\n\n- Low ferritin. Iron is required at multiple steps in the energy production chain. Many women run at ferritin 20 to 40 and feel exhausted. Standard labs call this \"fine.\"\n- Sluggish thyroid signal. Even small reductions in Free T3 drop cellular energy. Standard labs miss this because TSH is the only marker most doctors run.\n- Chronic stress. Cortisol elevated for years shifts cellular resources away from energy and toward survival.\n- B-vitamin deficiency, especially B12 and methylated folate. Many people have a methylation pattern that makes synthetic folic acid (in most multivitamins) actually counterproductive.\n- Chronic infection. Stealth pathogens, EBV reactivation, mold, Lyme. The immune system burns through mitochondrial resources fighting the load.\n- Sleep apnea. If your oxygen saturation drops at night, the mitochondria spend the night starving.\n\n## What Good Looks Like\n\nWhen the floor is rebuilt, you wake up at 7 with energy. You do not need coffee to think. You can train and recover. You feel warm in your hands and feet. Your hair regrows. Your hairline thickens. Your mood lifts in a way that is not about willpower.\n\nThis is Phase M of the MARCH framework. It is the first phase for most cases because nothing else holds without it.\n\n## What To Ask About\n\nIf you suspect you are in Phase M, the workup includes a full iron panel (ferritin, serum iron, TIBC, transferrin saturation), a complete thyroid panel (TSH, Free T4, Free T3, Reverse T3, TPO and TgAb antibodies), B12 and methylated folate, vitamin D, and a metabolic panel. Most physicians will run only TSH and call it done. That is why the answer keeps being \"you are fine.\"\n\nIf you have read this and you nod at every paragraph, your next step is the Phase Quiz, then a conversation with Coach Farren.\n"}, {"id": "energy-mito-floor", "library": "Energy", "cluster": "Mechanism", "title": "The Mitochondrial Floor", "subtitle": "Why Phase M is where almost every case starts.", "phase": "M", "readTime": 5, "content": "\nThe mitochondrial floor is a phrase that came out of running thousands of cases and watching what actually changes when we change things. It refers to the cellular energy production capacity that every other system depends on.\n\nIf the floor is broken, hormones do not hold. Gut healing does not stick. Workouts do not produce results. Mood support does not lift the fog.\n\nIf the floor is solid, everything else becomes possible.\n\n## How The Floor Breaks\n\nMitochondrial dysfunction comes in waves. Most people did not have it 20 years ago. Now most cases we see have some version of it. The common drivers are predictable.\n\n- Chronic stress. Cortisol elevated for years steals resources away from cellular energy.\n- Nutrient deficiencies. Modern food, even when \"healthy,\" is lower in nutrients than the food our great-grandparents ate. Iron in particular.\n- Post-viral damage. COVID, EBV, mononucleosis, recurrent flu. Each leaves a wake. For some people the wake is permanent until specifically addressed.\n- Toxic exposure. Mold, plastics, environmental chemicals, heavy metals.\n- Sleep disruption. Years of poor sleep architecture compounds.\n- Overtraining without adequate recovery.\n- Sedentary lifestyle. Mitochondria need movement to maintain themselves.\n\n## How We Rebuild It\n\nPhase M work is not glamorous. It is foundational. We replenish raw materials first. Iron if ferritin is low. B-complex with the right forms. CoQ10. Magnesium. Sometimes mitochondrial peptides like MOTS-C in advanced cases.\n\nWe protect circadian rhythm. Morning sunlight within 30 minutes of waking. Last meal at least 3 hours before bed. Cold dark cool bedroom. Phone out of the room.\n\nWe address sleep apnea if it exists. We fix iron if it is low. We work on the thyroid if it is sluggish.\n\nThe work in Phase M takes 6 to 12 weeks to show in labs. People often feel the shift earlier, around Week 3 or 4. By Week 8 most clients report sustained energy without caffeine, better sleep depth, recovery from training, and the return of warmth in their hands and feet.\n\nThat is the floor coming back online.\n\n## When To Move On\n\nWe move from Phase M to Phase A when the energy floor is stable. That looks like consistent morning energy, productive workdays without caffeine crashes, recoverable workouts, and labs trending toward functional optimal ranges.\n\nIf you skip ahead before Phase M is stable, the next phase will feel like it is not working. Because the floor underneath is still broken.\n"}, {"id": "energy-iron", "library": "Energy", "cluster": "Mechanism", "title": "The Iron Question", "subtitle": "Ferritin is the marker most doctors miss. It is also the marker that changes the most cases.", "phase": "M", "readTime": 4, "content": "\nIron deficiency is the most common deficiency in the world. It is also the most consistently missed by standard medicine, because most physicians look at hemoglobin and call it done. By the time hemoglobin drops, iron stores have been depleted for years.\n\nFerritin is the storage marker. It tells you what your iron stockpile looks like, not just what is circulating today.\n\n## Why Ferritin Matters\n\nIron is required for:\n\n- Mitochondrial energy production\n- Thyroid hormone conversion (T4 to T3 needs iron)\n- Hair growth (the follicles are iron-hungry)\n- Brain function and dopamine synthesis\n- Immune function\n- Healthy menstrual cycles\n- Recovery from exercise\n\nWhen ferritin drops below about 70 ng/mL, most women start losing hair, feel exhausted, get cold easily, and lose libido. When it drops below 50, fatigue gets significant. When it drops below 30, even basic activities feel hard.\n\nStandard reference ranges call ferritin \"in range\" anywhere from about 10 to 200. The functional optimal range is 70 to 150 for women and 80 to 150 for men. The gap between \"in range\" and \"optimal\" is where most cases live.\n\n## Why Women Are Especially Hit\n\nWomen lose iron every month through menstruation. Heavy or long cycles compound the loss. Pregnancy depletes iron. Breastfeeding depletes iron. Plant-based diets often lack bioavailable iron. Coffee and tea with meals block iron absorption. PPIs and antacids reduce stomach acid which reduces iron uptake.\n\nThe result is that the majority of menstruating women run iron-deficient at some point, and most never know because no one ran ferritin.\n\n## What Good Looks Like\n\nFerritin between 70 and 150 for women, 80 to 150 for men. Hemoglobin solid. Serum iron and transferrin saturation in the upper-middle range.\n\nWhen iron is restored, energy comes back, hair grows in, hands and feet warm up, the menstrual cycle regulates, libido returns.\n\nThe protocol is not always oral iron. Some forms cause GI distress. Some people have absorption issues that require different forms. A few need IV iron when oral has failed. This is case-specific.\n\n## What To Ask About\n\nIf you suspect iron is part of your story, you want a full iron panel: ferritin, serum iron, TIBC, transferrin saturation, plus a CBC with hemoglobin and hematocrit. Inflammation can falsely elevate ferritin so we also look at hs-CRP to interpret the number.\n\nMost physicians will run hemoglobin only. Tell them you want ferritin specifically. If they refuse, that is the signal that you need a different lane.\n"}, {"id": "energy-thyroid", "library": "Energy", "cluster": "Mechanism", "title": "The Thyroid Conversion Problem", "subtitle": "TSH alone misses most thyroid cases. Here is what the full panel actually shows.", "phase": "M", "readTime": 5, "content": "\nYour thyroid makes mostly T4. T4 is a storage hormone. It does not do much on its own. The body has to convert T4 into T3, the active hormone, before it can do its job at the cellular level.\n\nThat conversion happens in the liver, the gut, and various tissues. It requires selenium, zinc, iron, and a healthy stress and inflammation profile. When any of those break down, you can have plenty of T4 in storage and still feel hypothyroid because none of it is getting converted to T3.\n\nStandard medicine runs TSH and stops. TSH only tells you what the pituitary is shouting at the thyroid. It does not tell you what is actually getting made, what is getting converted, or what is getting blocked.\n\n## The Full Panel You Want\n\n- TSH (functional optimal: 0.5 to 2.0)\n- Free T4 (functional optimal: mid-range)\n- Free T3 (functional optimal: upper third of range)\n- Reverse T3 (functional optimal: under 15)\n- Free T3 to Reverse T3 ratio (functional optimal: above 20)\n- TPO antibodies (any elevation is the autoimmune signal)\n- Thyroglobulin antibodies (TgAb, same story)\n\nThis panel reveals whether you are:\n\n- Truly low in production (low Free T4, high TSH)\n- Producing but not converting (normal T4, low Free T3, possibly high Reverse T3)\n- Autoimmune (elevated TPO or TgAb regardless of TSH)\n- Stress-blocked conversion (high Reverse T3, low ratio)\n- Subclinical (TSH at 3.5, Free T3 floor, all \"in range\" on paper)\n\n## Why This Matters\n\nThe number of people who feel hypothyroid and are dismissed because \"your TSH is normal\" is enormous. The conversion problem and the autoimmune attack are both real and both responsive to the right work.\n\nHashimoto's, the autoimmune attack on the thyroid, is the most common cause of hypothyroidism. The diagnosis is TPO or TgAb antibodies. Medication treats the hormone level but not the autoimmune attack. The attack continues, tissue continues to be destroyed, and the dose keeps creeping up. Functional work addresses the upstream triggers: gut leakiness, chronic stress, nutrient deficiencies, hidden infections.\n\n## What Good Looks Like\n\nEnergy comes back. Cold extremities warm up. Hair stops falling. Bowels regulate. Mood lifts. Weight responds to nutrition again. Cycles stabilize.\n\nIf you have been on thyroid medication for years and still feel awful, that is the signal that the medication is treating the number, not the case. The conversation that opens up there is a real one. The lab work that opens up is a full panel, not just TSH.\n"}, {"id": "energy-adrenal", "library": "Energy", "cluster": "What To Test", "title": "Adrenal Patterns", "subtitle": "What the cortisol rhythm tells you about your fatigue type.", "phase": "R", "readTime": 4, "content": "\nYour adrenal glands make cortisol on a rhythm. High in the morning to wake you up, tapering through the day, low at night to let you sleep. When that rhythm breaks, you get characteristic patterns of fatigue.\n\nThe four common adrenal patterns we see:\n\n## Pattern 1: Wired in the morning, crashed in the afternoon\n\nHigh AM cortisol, normal during the day, crashes by 2 PM. Usually means HPA axis is overactive in the morning. Common in driven, high-achieving clients with chronic over-stimulation. Coffee makes it worse. Sleep is often disturbed at 3 AM because the system is overactive overnight.\n\n## Pattern 2: Flat all day\n\nLow cortisol throughout. No energy curve. You wake exhausted, you stay exhausted. This is later-stage HPA dysfunction, sometimes called \"adrenal fatigue\" though the science calls it HPA axis suppression. Often comes after years of chronic stress when the system stops trying. Sleep is heavy but not restorative.\n\n## Pattern 3: Low AM, high PM\n\nWrong-way curve. Tired in the morning, wired at night. Often shows up in shift workers, night-eaters, postpartum, or chronic insomniacs. The rhythm has flipped. Sleep onset is hard. Energy hits at 9 PM right when you should be winding down.\n\n## Pattern 4: High all day\n\nCortisol elevated across the curve. Anxious, wired, no rest. Sympathetic dominance. Common in acute high-stress periods. Long-term this pattern transitions into pattern 2 as the system burns out.\n\n## What To Do With Any Of These\n\nThe temptation is to treat cortisol directly. Adaptogens. Phosphatidylserine for the high-pattern. Adrenal cortex for the low-pattern. These can help acutely but they do not address why the rhythm broke.\n\nThe real work is upstream:\n\n- Reduce the actual stress load if you can\n- Protect sleep architecture: dark room, cool room, last meal 3 hours before bed, phone out\n- Morning sunlight within 30 minutes of waking\n- Protein within an hour of waking\n- Stable blood sugar across the day\n- Address inflammation (gut, infection, autoimmune)\n- Nervous system regulation work (breathwork, slow walking, vagal tone)\n\nCortisol rhythm responds within 4 to 8 weeks when the upstream work is done. Faster if a key driver gets addressed (an infection cleared, a job changed, a sleep issue fixed).\n\n## What To Test\n\nA 4-point or 6-point salivary cortisol panel, or the cortisol panel inside a DUTCH test, shows the actual rhythm. Single-point morning serum cortisol misses everything because it only captures one timepoint.\n\nIf your fatigue does not match the Phase M pattern (iron and thyroid), Phase R adrenal work is often the answer.\n"}, {"id": "weight-cant-lose", "library": "Weight", "cluster": "Foundations", "title": "Why You Can't Lose Weight Even Eating Less", "subtitle": "If calories in and calories out worked, you would not be reading this.", "phase": "MAC", "readTime": 5, "content": "\nYou have tried. You ate less. You moved more. You did the protein thing, the macros thing, the fasted training thing. The scale moved a little then stalled. Or it never moved at all. Or you lost it and gained it back twice.\n\nThe frustration here is real. The standard advice has failed you. And the standard advice has failed you because it ignores three things: your metabolic floor, your hormones, and your gut.\n\n## The Three Things That Actually Run The Show\n\n**Your metabolic rate.** Your body decides how many calories to burn based on signals it gets from the environment. Chronic dieting tells the body that food is scarce. The body responds by lowering metabolic rate. This is metabolic adaptation, and it is why eating less stops working over time.\n\n**Your hormones.** Insulin, thyroid, estrogen, cortisol, leptin. Each one influences where fat is stored, how easily it is mobilized, and whether your body even thinks you should have body fat to lose. Hormonal weight does not respond to caloric restriction the way regular weight does.\n\n**Your gut.** Inflammation in the gut produces inflammatory cytokines that drive insulin resistance and fat storage. Dysbiosis (the wrong bacteria) alters how you absorb and metabolize food. A leaky gut keeps the body in low-grade immune activation, which keeps cortisol elevated, which keeps fat held onto.\n\n## What You Probably Need To Investigate\n\nThe case-shape that drives stubborn weight is usually one of these or some combination:\n\n- Insulin resistance, undiagnosed. Fasting insulin tells the story. If your insulin is high, fat will not mobilize, regardless of how much you cut calories.\n- Hypothyroidism, undertreated or untreated. If T3 is low, metabolic rate drops. You can eat less and not lose because the cells are not burning.\n- Estrogen dominance. Often shows up in perimenopause, postpartum, post-pill, or with stress. Fat storage shifts to hips, thighs, and lower belly.\n- Cortisol dysregulation. Chronic stress elevates cortisol which drives belly fat storage and insulin resistance.\n- Leaky gut and chronic inflammation. The body holds onto weight as part of the stress response.\n- Iron deficiency. Without iron, cellular energy drops, and the system slows everything to conserve.\n\n## What The Fix Actually Looks Like\n\nWe work upstream. We fix the metabolic floor first (Phase M). We address gut inflammation (Phase A). We regulate stress and cortisol (Phase R). Then hormones rebalance (Phase C). At that point, body composition responds again to nutrition and training (Phase H).\n\nThe order matters. If you skip ahead to \"eat less, train more\" while the upstream issues are unresolved, the work does not hold.\n\nA useful starting workup includes: fasting insulin, HbA1c, full thyroid panel, female hormone panel for women (estradiol, progesterone, FSH, LH, free testosterone, SHBG, DHEA-S), full iron panel, hs-CRP, vitamin D, and sometimes a DUTCH test if cycle symptoms are present.\n\nThe path forward is not a smaller portion. It is finding the upstream issue and addressing it. Then the weight responds.\n"}, {"id": "weight-insulin", "library": "Weight", "cluster": "Mechanism", "title": "The Insulin Story", "subtitle": "Insulin runs the storage decision. If insulin is high, fat cannot leave.", "phase": "C", "readTime": 4, "content": "\nInsulin is the storage hormone. When you eat, especially carbohydrates, insulin rises and tells your cells to take up the sugar. After the sugar is handled, insulin drops, and the body can start mobilizing stored fat for energy.\n\nThat is the design. Insulin up after meals. Insulin down between meals and overnight. Fat mobilization happens when insulin is down.\n\nWhen insulin stays elevated, fat cannot mobilize. Storage stays storage. You can be in a caloric deficit and still not lose fat because the storage decision is locked.\n\n## How Insulin Gets Stuck High\n\n- Chronic high-carb intake without movement\n- Frequent eating (every 2 to 3 hours) which never lets insulin drop\n- Chronic stress elevating cortisol which raises blood sugar\n- Sleep deprivation which destroys insulin sensitivity\n- Sedentary lifestyle\n- PCOS for women, low testosterone for men\n- Sugar-sweetened drinks even occasionally\n- Visceral fat which is itself metabolically active and worsens insulin resistance\n\nInsulin resistance is when the cells stop responding to normal insulin levels and the pancreas has to pump out more and more to do the same job. The high insulin keeps fat locked in storage.\n\n## How To Tell If This Is You\n\nSymptoms: belly fat that will not move regardless of diet, intense afternoon energy crashes, hunger 2 hours after eating, sleepy after meals, dark patches of skin in folds (acanthosis nigricans), skin tags, irregular cycles in women, low energy.\n\nLab markers: fasting insulin above 10 (functional optimal is 2 to 5), HbA1c above 5.3 (functional optimal is 4.8 to 5.2), fasting glucose above 90, HOMA-IR above 1.5.\n\nMost physicians run fasting glucose only. That misses early insulin resistance because the body keeps glucose normal by pumping out more insulin. By the time fasting glucose is high, you have been insulin resistant for years.\n\n## What Helps\n\n- Lower carb intake, especially refined carbs and liquid sugar\n- Protein-forward meals, fewer meals (3, not 6)\n- Resistance training (the most effective insulin sensitizer)\n- Sleep, real sleep\n- Walking after meals\n- Magnesium, berberine, sometimes inositol for women with PCOS\n- Address gut inflammation which feeds insulin resistance\n- In severe cases, GLP-1 medications can help reset the system\n\nInsulin sensitivity responds within 2 to 8 weeks of consistent work. You feel it before you see it. The afternoon crash goes away first. Then hunger settles. Then fat starts to mobilize.\n\nThis is Phase C work in the MARCH framework. Often paired with Phase M to make sure the cells can burn what gets mobilized.\n"}, {"id": "weight-estrogen", "library": "Weight", "cluster": "Mechanism", "title": "Estrogen and Stubborn Fat", "subtitle": "If your fat sits on hips, thighs, and lower belly, estrogen is in the story.", "phase": "AC", "readTime": 4, "content": "\nEstrogen drives where fat is stored. In women, that means hips, thighs, breasts, and lower belly. In men with estrogen issues, that means lower belly and chest tissue.\n\nThe body fat itself produces more estrogen (through an enzyme called aromatase). So body fat increases estrogen and high estrogen drives more body fat in the estrogen-sensitive areas. It is a loop.\n\nEstrogen dominance is the common pattern. It does not always mean estrogen is too high in absolute terms. Often it means estrogen is too high relative to progesterone. Progesterone is the opposing hormone. When progesterone drops (perimenopause, post-pill, chronic stress, anovulatory cycles), estrogen dominance shows up even when estradiol is normal.\n\n## How Estrogen Dominance Shows Up\n\n- Stubborn fat in hips, thighs, lower belly\n- Heavy or painful periods, PMS that takes you out\n- Breast tenderness, fibrocystic breasts\n- Mood swings tied to cycle\n- Endometriosis or fibroids\n- Sleep issues, especially 2 to 4 AM wakeups\n- Weight gain after pregnancy or coming off birth control\n- Worse symptoms with stress\n\n## What Drives It\n\n- Liver phase 1 and 2 detox not flowing (the liver clears used estrogen)\n- Constipation (used estrogen gets reabsorbed from a sluggish gut)\n- Chronic stress lowering progesterone\n- Birth control or HRT without progesterone balance\n- Xenoestrogens from plastics, conventional meat, dairy\n- Postpartum, perimenopause, post-anorexia recovery\n\n## The Workup\n\nDay 19 to 22 estradiol and progesterone (luteal phase). A DUTCH test shows the metabolites: 2-OH (good), 4-OH (concerning), 16-OH (estrogenic). The 2-OH to 4-OH ratio tells you whether you are detoxifying estrogen safely.\n\nAlso: liver enzymes (ALT, AST, GGT), bilirubin, full thyroid (estrogen and thyroid talk to each other), gut health markers.\n\n## What Helps\n\nPhase A work first. Open the detox channels. DIM, calcium D-glucarate, sulforaphane, NAC, TUDCA, milk thistle. These support estrogen clearance through the liver.\n\nPhase A work also includes gut. Daily bowel movements (the gut clears reabsorbed estrogen). Cruciferous vegetables daily. Fiber.\n\nPhase C work follows. Progesterone support, often Progest-E. Sometimes Vitex if not Hashimoto's. Cycle regulation.\n\nThe body composition shift comes after the hormone shift. Often 6 to 12 weeks of upstream work before the hips and thighs respond. The frustration is that you have to do the unsexy work first. The reward is that the body composition shift then holds.\n\nIf you have read this and the symptom list maps onto you, the next step is a full female hormone panel with a coach who knows what to look for.\n"}, {"id": "weight-postpartum", "library": "Weight", "cluster": "Patterns", "title": "Postpartum Weight That Will Not Move", "subtitle": "Postpartum is its own metabolic environment. Standard fat loss advice misses it.", "phase": "MAR", "readTime": 4, "content": "\nYou had a baby. You are nine months postpartum, or eighteen, or three years. The baby weight has not moved. Or it moved a little and stalled. You have heard everyone tell you that you just need to eat less and try harder.\n\nWhat is actually happening in postpartum is a different metabolic environment. Treating it like a regular fat loss case is why nothing has worked.\n\n## What Is Different About Postpartum\n\n**Iron is gone.** Pregnancy depletes iron stores. Birth depletes iron stores. Breastfeeding depletes iron stores. Most postpartum women are running ferritin under 50. Many are under 30. Iron-deficient bodies do not lose fat efficiently because the cells cannot burn it.\n\n**Thyroid is often shifted.** Postpartum thyroiditis affects 5 to 10% of women. Many cases go undiagnosed. Even without thyroiditis, thyroid hormone levels shift after birth and often need targeted support.\n\n**HPA axis is dysregulated.** Sleep deprivation, increased load, no recovery. Cortisol is elevated for years sometimes. Cortisol drives belly fat storage and insulin resistance.\n\n**Estrogen dominance.** Progesterone often does not come back to baseline. Cycles return irregular. Mood swings appear. Belly fat held onto.\n\n**Inflammation is up.** Pregnancy and birth create inflammation. If diet quality has slipped due to time constraints, it stays up.\n\n**Lactation hormones.** Prolactin is elevated. Prolactin opposes some fat loss signals.\n\n**The pelvic floor is healing.** Aggressive training without core and pelvic floor recovery can actually slow progress and create new problems.\n\n## What The Work Looks Like\n\nYou start with Phase M. Iron. Thyroid. Sleep, even broken sleep, protected as much as possible. Real food, protein-forward, enough to support energy and lactation if breastfeeding.\n\nYou add Phase A and R. Gut inflammation reduced. Cortisol rhythm supported. Nervous system regulation. Real recovery.\n\nYou wait on aggressive training. Walking first. Strength when the body is ready. Cardio sparingly. Heart rate variability matters more than heart rate maxed out.\n\nYou do not chase fat loss with a caloric deficit until the floor is stable. Often the body composition shift happens without a deficit once iron, thyroid, gut, and cortisol are addressed. The body lets the weight go when it feels safe.\n\n## What To Test\n\nFull iron panel. Full thyroid panel including TPO and TgAb. Vitamin D. Female hormone panel at the right cycle phase. Adrenal markers. Sometimes a DUTCH test. Sometimes a gut panel.\n\nStandard \"your labs are fine\" does not work here. The postpartum body needs functional ranges, not standard ranges.\n\nThe body will respond. The order matters. The patience pays.\n"}, {"id": "weight-plateau", "library": "Weight", "cluster": "Patterns", "title": "The Plateau Pattern", "subtitle": "When the work stops working, the body is asking for a different question.", "phase": "MARCH", "readTime": 4, "content": "\nYou lost the first 10 to 15 pounds. Then the scale stopped. You doubled down: more cardio, less food. Nothing. You held the line for a month. Nothing. You felt worse. Energy dropped. Sleep got worse. Mood crashed.\n\nThis is the plateau pattern, and it is the body asking a different question than the one you are answering.\n\n## What Is Happening At The Plateau\n\nYour body adapts. Metabolic rate drops to match the new lower caloric input. Hormones shift. Thyroid output drops (T3 in particular falls fast in extended dieting). Cortisol elevates. Hunger hormones (ghrelin) go up. Satiety hormones (leptin) go down. Sleep architecture deteriorates. Recovery from training suffers.\n\nThese are not signs of failure. These are signs that the body has done what it does. It defends itself.\n\nIf you keep pushing, the body keeps defending. The plateau gets deeper. You can hit a point where you are eating less than 1400 calories, training 5 days a week, and gaining weight. That is end-stage metabolic adaptation.\n\n## The Fix Is Counterintuitive\n\nYou do not push harder. You back off the deficit. You feed the system. You let cortisol come down. You let thyroid come back. You let the metabolic rate normalize.\n\nThis is called a metabolic reset or a reverse diet. It takes 8 to 16 weeks usually. Calories increase slowly while training stays moderate. The body relearns that food is safe.\n\nAfter the reset, you can run another fat loss phase from a higher baseline. The math works better. The hormones cooperate. The plateau breaks.\n\n## Watch For The Pattern That Drove The Plateau\n\nSometimes the plateau is hormonal. Estrogen, thyroid, or insulin resistance. Sometimes it is gut. Sometimes it is iron. Sometimes it is sleep. The plateau is not just the diet. The plateau is the floor underneath being broken.\n\nThe workup at plateau is the same as the workup at the start. Full iron, full thyroid, full female hormone, fasting insulin, HbA1c, hs-CRP, vitamin D, and a conversation about sleep and stress.\n\nThe body composition response after a real metabolic reset and an addressed upstream issue is often dramatic. Clients who were stuck for 18 months drop 12 to 20 pounds in the next 4 months when the work shifts from \"more deficit\" to \"address what's actually wrong.\"\n\nThe frustration of the plateau is real. The fix is not the obvious one. That is why most people are stuck there.\n"}, {"id": "gut-bloat", "library": "Gut", "cluster": "Foundations", "title": "Why You're Bloated After Every Meal", "subtitle": "Bloating is not a normal cost of eating. It is a signal.", "phase": "A", "readTime": 5, "content": "\nYou eat. You bloat. Sometimes within 20 minutes. Sometimes 2 hours later. Your stomach distends. Your pants get tight. You feel sluggish, foggy, sometimes nauseated. You have started cutting whole categories of food trying to figure out what is causing it. Nothing has fully solved it.\n\nBloating is not normal. It is a signal that one of several systems is not doing its job. The good news is that the systems are knowable and addressable.\n\n## What Bloating Usually Means\n\nBloating is gas. Either you are producing too much gas inside your gut, or the gas you produce is not moving through.\n\nThe common causes:\n\n**SIBO (small intestinal bacterial overgrowth).** Bacteria that belong in the colon end up in the small intestine. They ferment food before you can absorb it. Bloating starts within 20 to 90 minutes of eating. Often worse with carbs and fiber. May come with diarrhea (hydrogen SIBO) or constipation (methane SIBO).\n\n**Low stomach acid.** Food is not broken down at the top of the digestive process. It moves through partially digested. The lower gut ferments it. Bloat appears 1 to 3 hours after meals. Often paired with reflux. PPI medications often make this worse over time.\n\n**Bile flow issues.** The gallbladder or liver is not releasing bile properly. Fat is not emulsified. Fat-soluble vitamins are not absorbed. Bloating after fatty meals. Pale stools. Right-upper abdominal discomfort.\n\n**Slow motility.** The migrating motor complex (the cleaning wave between meals) is sluggish. Food sits longer than it should. Gas builds up. Often paired with hypothyroidism.\n\n**Histamine intolerance or MCAS.** Bloating with skin flushing, headaches, racing heart. The mast cells in the gut are overreactive.\n\n**Constipation.** If bowels are not moving, gas backs up. Daily bowel movements are the goal. Anything less is too slow.\n\n**Food sensitivity not what you think.** Gluten and dairy are common but so are FODMAP foods, eggs, soy, and additives. Sometimes the sensitivity is not the food itself but the bacteria fermenting it.\n\n## What To Investigate\n\nA breath test (lactulose 3-hour) is the gold standard for SIBO. A GI-MAP stool test shows pathogens, parasites, dysbiosis, inflammation markers, and digestive function. Sometimes both are needed.\n\nStomach acid can be tested with a betaine HCl challenge under coaching supervision. Bile flow can be assessed by looking at stool color, ALT/AST, GGT, and sometimes ultrasound.\n\n## What Good Looks Like\n\nYou eat and you do not feel it for hours. Your stomach stays flat. Energy comes back after meals instead of crashing. Skin clears. Mood lifts. Sleep improves. Cycle regulates.\n\nThe gut is the central hub of the body. When it works, almost everything else works. When it does not, almost everything else struggles.\n\nThis is Phase A of the MARCH framework. For many cases it is where everything starts to shift.\n"}, {"id": "gut-sibo", "library": "Gut", "cluster": "Mechanism", "title": "SIBO Explained Without the Mystery", "subtitle": "Bacteria in the wrong place. Here is what that means and why it is so hard to clear.", "phase": "A", "readTime": 5, "content": "\nSIBO stands for small intestinal bacterial overgrowth. Bacteria that belong in the colon end up in the small intestine. They ferment your food before you absorb it. That is the bloat, the gas, the food reactions, the brain fog after meals.\n\nSIBO has become one of the most common functional gut diagnoses. It is also one of the most over-treated and under-resolved. Most people who have it have done courses of rifaximin or herbal antimicrobials. The symptoms come back within months.\n\nThat is not because SIBO is incurable. It is because most protocols treat the symptom (overgrowth) without fixing what allowed the overgrowth in the first place.\n\n## What Allows SIBO\n\nThe small intestine has several defenses that keep bacteria moving through and out.\n\n- Stomach acid kills incoming bacteria before they reach the small intestine. Low stomach acid (often from chronic PPI use, stress, or aging) opens the gate.\n- Bile flow has antimicrobial action. Sluggish bile lets bacteria settle.\n- The migrating motor complex is the cleaning wave that sweeps the small intestine between meals. When motility is slow (often from hypothyroidism, vagus nerve issues, or post-infection damage), bacteria have time to colonize.\n- The ileocecal valve separates small intestine from colon. Structural issues here can allow colonic bacteria to flow upstream.\n\nFix any one of these and you have a chance at clearance. Skip them and the bacteria return.\n\n## The Three Types of SIBO\n\n**Hydrogen SIBO.** Diarrhea-predominant. Bloating soon after meals. Often improves on low-FODMAP.\n\n**Methane (now called IMO).** Constipation-predominant. Slow motility. Often paired with low T3 thyroid.\n\n**Hydrogen sulfide.** Rotten egg burps. Diarrhea. Skin reactivity. Harder to test (newer test called Trio-Smart catches it).\n\nEach type responds to different antimicrobials. Treatment is not one-size-fits-all.\n\n## What The Protocol Looks Like\n\nWe start with a breath test (lactulose 3-hour) to confirm the diagnosis and type. We address upstream drivers in parallel: stomach acid support if low, bile flow support, thyroid optimization if hypothyroid, vagus nerve work.\n\nKill phase runs 4 to 6 weeks. The specifics depend on type. For hydrogen, herbal antimicrobials including allicin, oregano, and berberine. For methane, paired herbals plus neem. For hydrogen sulfide, gentler protocols with bismuth.\n\nAfter kill phase comes rebuild. Gut lining repair (glutamine, zinc carnosine, slippery elm). Beneficial bacteria. Then expansion of diet.\n\nProkinetic agents (motility support) run alongside and after to keep the cleaning wave active.\n\n## Diet During Treatment\n\nBiphasic diet or low-FODMAP for 4 to 6 weeks during kill phase. Then progressive reintroduction. The goal is not lifetime restriction. Long-term low-FODMAP starves beneficial bacteria and creates new problems.\n\n## When To Retest\n\nBreath test at 6 weeks if symptoms persist or have not fully resolved. 12 weeks regardless to confirm clearance.\n\n## Why Most Cases Relapse\n\nThree common reasons. The upstream driver was not addressed (low acid, slow motility, hypothyroid). The kill phase was too short for the load. The rebuild phase was skipped or rushed.\n\nA SIBO case that has relapsed 2 or 3 times is a case that needs a coach. The library tells you the framework. The case build sequences the protocol around your specific upstream issue.\n"}, {"id": "gut-leaky", "library": "Gut", "cluster": "Mechanism", "title": "The Leaky Gut Question", "subtitle": "Intestinal permeability is real. Here is what it means and what to do about it.", "phase": "A", "readTime": 4, "content": "\nYour gut lining is a single layer of cells separating the inside of your intestine from your bloodstream. Between those cells are tight junctions that normally stay closed and only allow nutrients through after they have been properly broken down.\n\nWhen the tight junctions become loose, partially digested food, bacterial fragments, and toxins leak into the bloodstream. The immune system sees these foreign particles and mounts a response. That response is chronic low-grade inflammation, and it is at the root of a huge number of conditions: autoimmune disease, food sensitivities, eczema, hormonal symptoms, fatigue, brain fog, anxiety.\n\nThis is leaky gut. Conventional medicine often dismissed it for years. The research has caught up. Intestinal permeability is now well documented.\n\n## What Causes It\n\n- Chronic stress (cortisol opens tight junctions)\n- NSAID use (ibuprofen, naproxen)\n- Antibiotics, especially repeated courses\n- Gluten in sensitive individuals (and in non-sensitive ones to a lesser degree)\n- Alcohol\n- SIBO and dysbiosis\n- Parasites and pathogens\n- Glyphosate exposure\n- High-sugar, high-processed-food diets\n\n## How It Shows Up\n\nThe symptoms are diverse because the systemic inflammation hits different bodies in different ways.\n\n- Bloating, gas, food reactions\n- Skin issues: eczema, acne, rosacea, psoriasis\n- Brain fog, anxiety, depression\n- Autoimmune flares\n- Joint pain\n- Fatigue\n- Hormonal symptoms that worsen with stress\n- Allergies and sensitivities to foods you used to tolerate\n\n## How To Test\n\nZonulin is a marker of tight junction integrity. Available as a blood test or in stool panels like GI-MAP. Elevated zonulin suggests increased permeability.\n\nThe functional clinical test is symptom pattern. If you have multiple symptoms across systems and the gut is symptomatic, leaky gut is likely a factor.\n\n## How To Heal It\n\nPhase A work, sequenced.\n\nFirst, remove drivers. Address SIBO if present. Cut gluten and dairy for at least 90 days. Eliminate alcohol during repair. Reduce NSAID use if possible. Reduce processed food.\n\nSecond, repair the lining. L-glutamine (the primary fuel for gut lining cells). Zinc carnosine. Slippery elm. Marshmallow root. Aloe inner leaf. Sometimes BPC-157 peptide for advanced cases under coaching.\n\nThird, repopulate. Probiotics, especially Saccharomyces boulardii in the early phase. Diverse fiber from foods. Fermented foods if tolerated.\n\nFourth, reintroduce. Gradually broaden the diet. Track reactions.\n\nHealing takes 3 to 6 months for most cases. Stress management is non-negotiable during this window because cortisol re-opens what you are trying to heal.\n\n## When To Go Deeper\n\nIf you have done all of the above and symptoms persist, the upstream issue is probably an infection (SIBO, candida, parasite, H. pylori) that needs targeted clearance. A GI-MAP test reveals most of these. The case build at that point is no longer self-directed library work. It is coaching work.\n"}, {"id": "gut-food-sensitivities", "library": "Gut", "cluster": "Patterns", "title": "Food Sensitivities vs Food Reactions", "subtitle": "Reacting to a food is information. The food is usually not the root cause.", "phase": "A", "readTime": 4, "content": "\nYou started reacting to foods you used to eat. Maybe it was gluten. Then dairy. Then eggs. Then nuts. Each time you cut something, your symptoms get better for a while, then a new food starts causing problems.\n\nThis is the food sensitivity spiral. The pattern is real and frustrating. The lesson it is trying to teach you is that the food is not the root cause.\n\n## What Is Actually Happening\n\nWhen the gut lining is permeable (leaky gut) and the immune system is on high alert, partially digested food particles cross into the bloodstream. The immune system flags them as foreign. It starts making antibodies to those foods.\n\nThe next time you eat the food, the antibodies attack. You feel it as bloating, fatigue, brain fog, joint pain, skin issues, sometimes anxiety. You correctly identify the food as a trigger. You cut it.\n\nThe leaky gut and inflammation continue. The immune system finds another food to attack. The pattern repeats.\n\nCutting more foods does not solve this. Closing the gut lining does.\n\n## What Tests Show\n\nIgG food sensitivity tests are common but controversial. They show what you have antibodies to, which often correlates with what you eat most. They identify reactions but do not identify the root cause.\n\nA better workup is gut function: GI-MAP for pathogens and dysbiosis, breath test for SIBO, zonulin for permeability, sometimes elimination protocols to identify acute triggers.\n\n## The Pattern That Tells You The Root Is Bigger\n\nIf you cut gluten and feel better, then cut dairy and feel better, then react to eggs, then react to nuts: the root is in the gut. Not in any individual food.\n\nIf you react to foods inconsistently (fine one week, miserable the next): mast cells or histamine intolerance is in the mix.\n\nIf reactions worsen with stress: cortisol is opening the gut lining repeatedly.\n\nIf reactions started after antibiotics or a stomach bug: dysbiosis and possibly SIBO are the root.\n\n## The Order Of Operations\n\nYou can keep restricting forever and the spiral continues. The way out is upstream.\n\nPhase A work. Identify and address infection if present. Heal the gut lining. Reduce inflammation. Regulate the nervous system (Phase R).\n\nOnce the lining is healed, foods that previously caused reactions often become tolerable again. The immune system stops being on hair-trigger. The body returns to a state where it can handle normal food without mounting a defense.\n\nThe fastest cases see this happen in 8 to 12 weeks. Stubborn cases take 6 to 12 months. Almost no case requires a lifetime of restriction.\n\nIf you have been on an increasingly restrictive diet for over a year and the list of foods you tolerate keeps shrinking, that is the signal that the root needs to be addressed, not that you need to cut another food.\n"}, {"id": "gut-bile", "library": "Gut", "cluster": "Patterns", "title": "Bile and Why It Matters", "subtitle": "Bile is more than fat digestion. It is detox, immunity, and hormone clearance.", "phase": "A", "readTime": 4, "content": "\nBile gets ignored in most functional medicine conversations because it is not glamorous. It does not have its own marketing. But almost no case fully resolves without addressing bile.\n\nBile is produced by the liver, stored in the gallbladder, and released into the small intestine after meals. It does several jobs:\n\n- Emulsifies fat so it can be absorbed\n- Carries fat-soluble vitamins (A, D, E, K) into the body\n- Activates the gallbladder to contract (a use-it-or-lose-it system)\n- Acts as an antimicrobial, keeping the small intestine clear of bacteria\n- Carries out used estrogen, toxins, and cholesterol through the stool\n- Activates the migrating motor complex (motility)\n\nWhen bile is sluggish, all of these jobs slow down. You see it in:\n\n- Poor fat digestion (pale or floating stools, nausea after fatty meals)\n- Fat-soluble vitamin deficiency (low vitamin D despite supplementing)\n- Recurrent SIBO (bile no longer keeping the small intestine clear)\n- Estrogen dominance (used estrogen gets reabsorbed)\n- Constipation (low motility from low bile signaling)\n- Skin issues from poor detoxification\n\n## What Causes Sluggish Bile\n\n- Gallbladder removal\n- Low-fat dieting for years (the gallbladder needs fat to stay active)\n- Estrogen dominance (estrogen thickens bile)\n- Birth control or hormone replacement\n- Stress\n- Low stomach acid (the trigger for bile release)\n- Liver congestion from chronic toxin or alcohol exposure\n- Hypothyroidism\n\n## What Helps\n\nBitter foods before meals (arugula, dandelion greens, bitter melon). Bitter herbs as a tincture before meals.\n\nTUDCA (tauroursodeoxycholic acid) is the most clinical of the bile supports. It thins bile, improves flow, supports liver phase 2 detox.\n\nOx bile for clients without a gallbladder.\n\nBeetroot or beet juice in small amounts.\n\nCoffee in moderation (it stimulates bile flow).\n\nCholine and phosphatidylcholine support liver and bile production.\n\nAdequate dietary fat, especially from olive oil, pasture-raised animal fats, and fatty fish.\n\n## What Good Looks Like\n\nStools are brown, formed, daily. No floating, no pale color. No nausea after fatty meals. Vitamin D levels respond to supplementation. SIBO does not return after clearance. Estrogen symptoms improve.\n\n## When This Is Your Lane\n\nIf you have had a gallbladder removed, if you have been low-fat for years, if your vitamin D will not budge despite supplementation, if your SIBO keeps coming back: bile is probably in the story.\n\nBile work runs alongside Phase A gut repair. It is not glamorous. It is the kind of thing a coach who has seen a lot of cases will think to address. Most physicians will not.\n"}, {"id": "hor-perimeno", "library": "Hormones", "cluster": "Foundations", "title": "Perimenopause Starts at 35", "subtitle": "The window most doctors miss. Where the symptoms first appear and what they mean.", "phase": "C", "readTime": 6, "content": "\nThe textbook says perimenopause hits at 45 to 50. The real timeline says it starts as early as 35. The label gets applied at the end of the window when periods stop. By then, you have spent a decade wondering why you feel like a different person.\n\nYour OB tells you everything looks fine. Your therapist offers antidepressants. Your GP runs a TSH and clears you. The conventional model misses the window because it is not looking at the underlying signals.\n\n## What Is Actually Happening\n\nPerimenopause is the 5 to 15 years before menopause. During this window:\n\nAnovulatory cycles increase. You ovulate less often. The cycle still shows up but without ovulation, no progesterone is made.\n\nProgesterone drops first. Often years before estrogen swings. Progesterone is the calming hormone. Low progesterone is anxiety, insomnia, irritability, breast tenderness, heavy periods, PMS that takes you out.\n\nEstrogen does not just fall. It spikes and crashes. Often higher than your 20s in the spikes. This is why hot flashes, sleep loss, weight redistribution, brain fog, and palpitations all hit at once, sometimes when the cycle still looks regular.\n\nFSH climbs as ovaries respond less reliably.\n\nThyroid often shifts in this window. So does insulin sensitivity. So does cortisol.\n\n## The Symptom Cluster Doctors Miss\n\n- 3 AM wakeups (low progesterone)\n- Heart palpitations, air hunger (estrogen swings)\n- Hot flashes, night sweats (sympathetic dysregulation)\n- Waking anxiety (low GABA from low progesterone)\n- Brain fog, memory misses\n- Weight redistribution to midsection (insulin sensitivity dropping)\n- Hair thinning (thyroid plus DHT shift)\n- Low libido\n- Mood swings that worsen pre-period\n- Cycle changes (shorter, longer, heavier, lighter)\n- Joint pain\n- Skin changes (dryness, sudden acne, sensitivity)\n\nThe kicker: many of these show up while your cycle still looks regular. The labels of \"perimenopause\" and \"menopause\" do not capture this window well.\n\n## The Full Workup\n\nIf you suspect this is you, the workup is bigger than what your OB will run.\n\n- Estradiol and progesterone, day 19 to 22 (luteal phase)\n- FSH, LH\n- Free testosterone, SHBG, DHEA-S\n- Full thyroid panel (TSH, Free T4, Free T3, Reverse T3, TPO, TgAb)\n- Fasting insulin, HbA1c\n- Ferritin, full iron\n- Vitamin D, omega-3 index\n- DUTCH test if estrogen detox is suspected\n\n## What Helps\n\nPhase M and A first if not already addressed. The hormone work does not land on a broken floor.\n\nPhase R for nervous system and cortisol.\n\nPhase C work for the hormones directly: Progest-E for progesterone support, sometimes vitex if not Hashimoto's, full estrogen detox stack if metabolites are off, conversation with a prescriber about HRT or BHRT when symptoms warrant.\n\nWeight training, heavy compounds 3 days a week. Zone 2 cardio 2 days. Two rest days. Protein at 1 g per pound. This is non-negotiable for body composition, bone density, and insulin sensitivity in this window.\n\nSleep protected. Stress reduced. Alcohol minimized (it worsens almost every perimenopause symptom).\n\nThe shift comes in 8 to 16 weeks usually. Sleep improves first, then mood, then body composition, then cycle.\n\n## What To Walk Away With\n\nPerimenopause is not \"old age.\" It is a 5 to 15 year transition that can be managed beautifully with the right framework. Most cases benefit dramatically from coaching because the work is multi-system and sequenced.\n\nIf you are in your late 30s or 40s and the symptoms map onto your week, you are not crazy and you are not \"just stressed.\" You are in the window. The window responds to work.\n"}, {"id": "hor-pms", "library": "Hormones", "cluster": "Foundations", "title": "PMS That Takes You Out", "subtitle": "Severe PMS is not normal. It is information about your hormones and your gut.", "phase": "AC", "readTime": 4, "content": "\nYou are functional 3 weeks of the month. Then the week before your period hits and you become a different person. Irritable, weepy, exhausted, bloated, breast-tender, broken out, foggy. Sometimes you cancel plans. Sometimes you snap at people you love. You know it is hormonal and you have been told for years that this is just \"what women deal with.\"\n\nIt is not normal. PMS at the severity that takes you out of life is a signal. PMDD is the more severe end of the same signal.\n\n## What Is Actually Happening\n\nThe luteal phase of your cycle (Day 14 to 28, roughly) is when progesterone should rise. Progesterone is the calming hormone. It supports GABA in the brain (the chill neurotransmitter), reduces inflammation, and balances estrogen.\n\nWhen progesterone is low, or when the progesterone to estrogen ratio is off, the luteal phase becomes destabilized. Estrogen dominates without enough progesterone to oppose it. You get:\n\n- Mood swings, irritability, weepiness\n- Breast tenderness\n- Bloating\n- Headaches\n- Sleep disruption, especially 3 to 4 AM wakeups\n- Sugar and carb cravings\n- Skin breakouts\n- Anxiety or panic\n\n## Why Progesterone Drops\n\n- Anovulatory cycles (no ovulation means no corpus luteum to make progesterone)\n- Chronic stress (cortisol steals progesterone via the \"pregnenolone steal\" pathway)\n- Perimenopause (progesterone is the first hormone to decline)\n- Post-pill or post-IUD (especially hormonal IUDs)\n- Thyroid issues (hypothyroidism reduces progesterone production)\n- Low ferritin (anovulatory cycles often correlate)\n- Postpartum (often takes years to return to baseline)\n\n## Why The Estrogen Side Matters Too\n\nIf progesterone is low AND estrogen is high (often because liver detox is sluggish or the gut is constipating estrogen back into the body), the imbalance is worse. The fix is two-sided.\n\n## What Helps\n\nPhase A work first. Open estrogen detox. DIM, calcium D-glucarate, sulforaphane, NAC. Daily bowel movements (one or two per day, formed, brown). Cruciferous vegetables daily. Reduce alcohol (alcohol blocks estrogen clearance).\n\nPhase R for stress. Cortisol burning through progesterone makes everything worse.\n\nPhase C for direct support. Progest-E (bioidentical sublingual progesterone) in the luteal phase, often Day 14 to 28. Sometimes vitex when not Hashimoto's. Magnesium 300 to 400 mg PM. B6 in the luteal phase.\n\nTrack temperature and cycle length. Confirm that ovulation is happening. If it is not, progesterone will not rise even with all the right supports.\n\n## The Workup\n\nCycle day 21 progesterone and estradiol. Full thyroid panel. Iron. Vitamin D. DUTCH test if you want the full hormone metabolite picture.\n\n## What Good Looks Like\n\nThe week before your period feels like the rest of the month. Slight mood shift, manageable. No breakdown. No cancellation of plans. Sleep continues. Skin holds. Bloating minimal.\n\nThis pattern of \"I am okay all month\" is possible. It is what most women functional medicine sees, achieve within 3 to 6 cycles of work. If you are skeptical, that is fair. Most women have lived with severe PMS so long they cannot imagine cycles without it.\n"}, {"id": "hor-anxiety", "library": "Hormones", "cluster": "Mood + Sleep", "title": "The Anxiety That Has No Reason", "subtitle": "When anxiety comes from nowhere, it usually has a hormonal or nutritional source.", "phase": "MR", "readTime": 4, "content": "\nYou wake up anxious. Or you feel fine in the morning and anxiety hits at 3 PM. Or the week before your period you become a different person. Or you can't sleep because your brain will not stop. Or you feel a low hum of dread that has no specific story behind it.\n\nIf you have looked at your life and there is no specific cause that explains the anxiety, the source is usually physiological. The pattern of \"anxiety without a reason\" is often hormonal, nutritional, or both.\n\n## What Drives Physiological Anxiety\n\n**Low progesterone.** Progesterone supports GABA, the calming neurotransmitter. Low progesterone = less GABA = more anxiety, especially in the luteal phase or postpartum or perimenopause.\n\n**Blood sugar instability.** When glucose drops, the body releases cortisol and adrenaline to bring it back up. You experience the adrenaline as anxiety. Often hits 2 to 4 hours after eating, especially carbs without protein.\n\n**Magnesium deficiency.** Magnesium is calming. Most people are deficient. Stress depletes it faster.\n\n**Iron deficiency.** Low ferritin shifts brain neurotransmitters. Anxiety and depression overlap with iron deficiency.\n\n**Thyroid issues.** Both hyper- and hypothyroidism can drive anxiety. Hashimoto's is famous for this.\n\n**Adrenal patterns.** Cortisol elevated in the wrong times of day produces wired-but-tired anxiety.\n\n**Gut inflammation.** The gut produces most of your serotonin. Gut inflammation = serotonin dysregulation = mood issues. The vagus nerve also runs gut to brain.\n\n**Caffeine sensitivity.** Especially with slow caffeine metabolism (genetic). Even modest amounts cause anxiety hours later.\n\n**Histamine intolerance.** Histamine spikes drive anxiety, racing heart, brain fog.\n\n**Hidden infection.** Mold, Lyme, Bartonella, chronic viral. Inflammation in the brain shows up as anxiety.\n\n## What To Try Before Medications\n\nIf anxiety has a physiological source, treating it with medication often misses the root and creates dependence. Worth investigating first.\n\nTrack when anxiety hits. Pre-period? Mid-afternoon? On waking? After meals? After exercise? The pattern tells you the source.\n\nStabilize blood sugar. Protein within an hour of waking. Real meals every 4 to 5 hours. Skip sugar and alcohol for two weeks and watch what changes.\n\nTest thyroid (full panel), ferritin, vitamin D, magnesium, B12, female hormones at the right cycle phase.\n\nTry magnesium glycinate 300 to 400 mg at bed. Try Progest-E luteal phase for women with PMS pattern.\n\nAddress the gut if inflammation symptoms are present.\n\nBreathwork or vagal tone work to regulate the nervous system in real time.\n\n## The Anxiety That Is Not Physiological\n\nIf your life situation actually merits anxiety (chronic stress, difficult relationship, financial pressure, trauma history), the medical workup may show normal results because the source is real. Therapy and life changes are the lane for that. The physiological workup is to rule out the things that medicine often misses.\n\nMost cases we see are some combination. A real stressor is amplified by a hormonal or nutritional vulnerability. Address the vulnerability and the same stressor becomes more manageable. The body has more capacity.\n\nIf your anxiety has been chronic and unexplained, the workup is worth running. The medication is often unnecessary once the source is found.\n"}, {"id": "hor-sleep", "library": "Hormones", "cluster": "Mood + Sleep", "title": "Sleep That Won't Come", "subtitle": "Insomnia is rarely random. The pattern of when you can't sleep tells you why.", "phase": "RC", "readTime": 4, "content": "\nSleep issues are categorized by when in the night they happen. The pattern points to the cause.\n\n## Can't Fall Asleep\n\nYou go to bed exhausted and your brain will not turn off. You lie there for an hour, two hours. Eventually you drift off.\n\nCommon drivers: cortisol high in the evening (should be dropping). Caffeine still active (longer than you think, especially with slow metabolism). Blue light exposure suppressing melatonin. Eating too close to bed. Anxiety pattern from unresolved stress or hormonal imbalance. Magnesium deficiency.\n\nWhat helps: morning sunlight to anchor circadian rhythm. Last caffeine by noon. Phone out of bedroom. Cool dark room. Last meal 3 hours before bed. Magnesium glycinate 300 to 400 mg PM. Phosphatidylserine if cortisol is high.\n\n## Wake at 1 to 3 AM\n\nYou fall asleep fine. You wake suddenly. Mind starts racing. Sometimes you fall back asleep, sometimes you do not.\n\nCommon drivers: low blood sugar overnight triggering cortisol. Low progesterone (especially in luteal phase, perimenopause, postpartum). High cortisol pattern. Alcohol earlier in the evening (you fall asleep, then it metabolizes and wakes you).\n\nWhat helps: protein snack before bed if blood sugar pattern (small, like a tablespoon of almond butter). Progest-E for women with progesterone pattern. Skip alcohol. Address the cortisol pattern with Phase R work.\n\n## Wake at 3 to 5 AM\n\nYou fall asleep, sleep through the night until early morning, then cannot fall back asleep.\n\nCommon drivers: cortisol awakening response too strong. Anxiety pattern. Hyperthyroid pattern. Estrogen withdrawal (perimenopause).\n\nWhat helps: melatonin low-dose (0.3 to 1 mg) at bed to reset rhythm. Adaptogens for cortisol. Address hyperthyroid if labs show it. Phase C work for women.\n\n## Wake Up Tired Despite Sleeping\n\nYou sleep 7 to 8 hours but wake exhausted. The hours are there. The quality is not.\n\nCommon drivers: sleep apnea (more common than you think, even in lean women). Low iron. Hypothyroidism. Chronic inflammation. Alcohol within 3 hours of bed. Heavy late meals.\n\nWhat helps: sleep study. Fix iron and thyroid. Address inflammation. Skip alcohol close to bed.\n\n## The Universal Fixes\n\nThese help every pattern:\n\n- Morning sunlight within 30 minutes of waking\n- Caffeine cutoff by noon\n- Phone out of bedroom\n- Cool, dark, cool room (65 to 68 degrees ideal)\n- Last meal 3 hours before bed\n- Wind-down routine: dim lights, no screens, slower pace\n- Magnesium glycinate 300 to 400 mg PM\n- Track sleep with a wearable to see what is actually happening\n\n## When To Investigate Deeper\n\nIf sleep has been broken for 6 months and the basics have not helped, run a full workup: thyroid panel, f
