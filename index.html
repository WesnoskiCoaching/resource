emale hormone panel (women), ferritin, vitamin D, cortisol rhythm via salivary or DUTCH test, and consider sleep study for apnea.\n\nSleep is upstream of almost everything. Almost no case fully resolves while sleep is broken. Working on sleep is some of the highest-leverage work in the framework.\n"}, {"id": "hor-pcos", "library": "Hormones", "cluster": "Patterns", "title": "PCOS Beyond Birth Control", "subtitle": "PCOS is a metabolic condition with hormonal symptoms. Birth control treats the symptom, not the condition.", "phase": "AC", "readTime": 5, "content": "\nYou were diagnosed with PCOS. Maybe in your teens, maybe in your 20s. The conventional advice was birth control to regulate the cycle, sometimes metformin for the insulin piece, sometimes spironolactone for the androgen symptoms.\n\nYears later, you came off birth control hoping for a cycle. It did not come, or it came chaotic. You have weight you cannot shift. Cystic acne. Hair where you do not want it, thinning where you do. Infertility or struggle to conceive. Mood issues.\n\nThe conventional approach treats the symptoms. It does not address the underlying metabolic and inflammatory drivers.\n\n## What PCOS Actually Is\n\nPCOS is a metabolic syndrome with hormonal expression. The core driver in most cases is insulin resistance. High insulin tells the ovaries to make more testosterone. High testosterone disrupts ovulation. Without ovulation, progesterone is not made. Estrogen builds up unopposed. The cycle fails.\n\nThe androgen symptoms (acne, hair loss on the scalp, hair growth on face and body, oily skin) come from the testosterone elevation.\n\nThe metabolic symptoms (weight gain especially in the midsection, energy crashes, intense carb cravings, dark patches of skin, skin tags) come from the insulin resistance.\n\nThe hormonal symptoms (irregular or absent cycles, infertility, mood swings, sleep issues) come from the disrupted ovulation pattern.\n\n## Not All PCOS Is Insulin-Driven\n\nThere are several subtypes. The most common is insulin-resistant PCOS (60 to 70% of cases). Others include:\n\n- Post-pill PCOS: temporary PCOS pattern after coming off hormonal birth control, often resolves with time\n- Inflammatory PCOS: driven by chronic inflammation, often gut-related\n- Adrenal PCOS: driven by high DHEA from adrenal stress, not from insulin\n- Lean PCOS: can have any of the above drivers, harder to diagnose because weight does not signal it\n\nThe protocol depends on the subtype. This is why generic PCOS advice fails so many women.\n\n## What The Workup Looks Like\n\n- Fasting insulin (the most important marker)\n- Fasting glucose, HbA1c, HOMA-IR\n- Free testosterone, total testosterone, SHBG\n- DHEA-S\n- Estradiol, progesterone, LH, FSH\n- Prolactin\n- Full thyroid panel (PCOS overlaps with Hashimoto's)\n- AMH (anti-Mullerian hormone, ovarian reserve)\n- Vitamin D, ferritin\n- Pelvic ultrasound for ovarian morphology\n\n## What Helps\n\nInsulin-resistant PCOS responds to:\n\n- Lower carb intake, especially refined carbs and liquid sugar\n- Higher protein, real meals\n- Resistance training (the most effective insulin sensitizer)\n- Inositol (myo and D-chiro in 40:1 ratio) is the most evidence-based supplement\n- Berberine (rivals metformin in some studies)\n- Magnesium\n- Address gut inflammation if present\n- Address sleep\n- Sometimes metformin, sometimes GLP-1 in cases where lifestyle alone is not moving the needle\n\nThe cycle often returns within 3 to 6 months of consistent metabolic work. Body composition shifts in parallel. Acne clears as testosterone normalizes. Hair growth slows. Hair regrows on the scalp.\n\nInflammatory and adrenal subtypes need different work first. Gut for inflammatory, stress and cortisol work for adrenal.\n\n## On Fertility\n\nPCOS is a leading cause of female infertility. It is also one of the most reversible causes when the metabolic work is done. Many women who were told they would need IVF go on to conceive naturally after 6 to 12 months of functional work.\n\nIf fertility is the goal, the timeline is 3 to 6 months of upstream work before actively trying. The body needs the lead time.\n"}, {"id": "hor-cycle-report", "library": "Hormones", "cluster": "Patterns", "title": "The Cycle as a Report Card", "subtitle": "Your menstrual cycle is one of the best diagnostic tools you have. Here is how to read it.", "phase": "C", "readTime": 5, "content": "\nThe menstrual cycle is sensitive to almost everything. Stress, food, sleep, exercise, thyroid, gut, infection, hormones. When something is off in the body, the cycle often shows it before any other symptom.\n\nMost women have not been taught how to read their cycle. The conventional approach treats irregular cycles with hormonal birth control, which masks the underlying signal without solving it.\n\nHere is what to actually look at.\n\n## Cycle Length\n\nA healthy cycle is 26 to 32 days. Shorter than 26 may signal anovulatory cycles or low ovarian reserve. Longer than 35 suggests delayed or skipped ovulation, common in PCOS, hypothyroidism, low body fat, or stress.\n\nVariability of more than 5 days month to month signals dysregulation.\n\n## Period Itself\n\nBleeding 3 to 7 days. Color bright red to dark red. Some clotting is fine. No flooding. No pads soaked through every hour.\n\nHeavy or long periods often signal estrogen dominance, fibroids, adenomyosis, or copper IUD irritation.\n\nSpotting before the period often signals low progesterone.\n\nBrown old blood at the start or end is normal in small amounts. Excessive brown blood can signal sluggish detox.\n\n## Mid-Cycle Ovulation Signs\n\nA healthy ovulation produces signs around Day 12 to 16.\n\n- Cervical fluid that becomes stretchy and clear (like egg white)\n- A slight rise in libido\n- Some women feel a one-sided pelvic twinge (mittelschmerz)\n- A temperature rise of 0.4 to 0.6 degrees the day after ovulation, sustained for the rest of the cycle\n\nIf you track basal body temperature with a thermometer or wearable and never see the post-ovulatory temperature rise, you may not be ovulating.\n\n## Luteal Phase\n\nThe luteal phase is from ovulation to period (about 12 to 14 days in a healthy cycle). This is when progesterone rises.\n\nShort luteal phases (under 10 days) signal low progesterone.\n\nSevere PMS in the luteal phase signals estrogen-progesterone imbalance.\n\nSleep disruption in the luteal phase signals low progesterone.\n\nBreast tenderness in the luteal phase signals estrogen dominance.\n\n## What This Tells You\n\nA regular cycle with healthy length, no severe symptoms, evident ovulation, and a healthy luteal phase tells you that the endocrine system is working. That is hard to fake. It is genuine homeostasis.\n\nA cycle that is irregular, anovulatory, symptomatic, or absent is reliable data. Something upstream is off.\n\n## When To Get Concerned\n\n- No cycle for 3 or more months (amenorrhea): hypothalamic suppression, PCOS, perimenopause, thyroid, prolactin issues\n- Cycles consistently shorter than 24 days: ovarian reserve concerns, perimenopause\n- Heavy bleeding requiring pad changes every hour: fibroids, adenomyosis, bleeding disorder, thyroid\n- Severe pain interfering with life: endometriosis, adenomyosis, infection\n- Severe mood changes that destabilize life: progesterone, gut, neurotransmitter issues\n- Spotting between periods: hormonal, structural, thyroid\n\n## The Workup\n\nDay 21 (or 7 days after ovulation) progesterone and estradiol. Day 3 FSH, LH, estradiol for ovarian reserve. Full thyroid panel. Prolactin if irregular cycles. AMH for fertility planning. DUTCH for full hormone metabolite picture.\n\n## Tracking\n\nApps and wearables (Oura, WHOOP, Apple Health) can track cycle. Better: track basal body temperature with a dedicated thermometer or fertility-tracking wearable. Add cervical fluid notes. Note mood and symptoms.\n\nThree months of tracking gives you a baseline. From there you can see what changes when you change things.\n\nThe cycle is one of the most reliable diagnostic tools you have for the female body. Most women have been taught to manage it. The framework here is to read it.\n"}, {"id": "case-sarah", "library": "Cases", "cluster": "Real Recoveries", "title": "Sarah · The Hashimoto's Recovery", "subtitle": "37, on thyroid medication for 5 years, exhausted, weight not moving. Here is how the case actually unfolded.", "phase": "MAC", "readTime": 5, "content": "\n*This is an anonymized composite based on real client work. Names and identifying details changed.*\n\nSarah came in at 37. She had been on levothyroxine for 5 years for Hashimoto's. Her TSH was \"in range\" on paper. She was exhausted, her hair was thin, her weight had crept up 25 pounds since the diagnosis, her cycle was unpredictable, and her energy crashed every afternoon. Her endocrinologist told her she was fine and that maybe she needed an antidepressant.\n\nShe did not want an antidepressant. She wanted her life back.\n\n## What The Full Workup Showed\n\nStandard panel had only shown TSH at 2.8. \"Within range.\"\n\nFull panel told a different story:\n\n- TSH: 2.8 (functional optimal: under 2.0)\n- Free T4: low-mid range\n- Free T3: bottom of range\n- Reverse T3: elevated\n- Free T3 to Reverse T3 ratio: well below 20 (functional optimal: above 20)\n- TPO antibodies: 380 (any elevation signals active autoimmune attack)\n- Ferritin: 22 (functional optimal: 70 to 150)\n- Vitamin D: 28 (functional optimal: 60 to 80)\n- Fasting insulin: 11 (functional optimal: under 5)\n- HbA1c: 5.5 (functional optimal: under 5.2)\n- Hs-CRP: 3.2 (functional optimal: under 1.0)\n\nShe was undermedicated, under-converted, autoimmune-active, iron-deficient, vitamin D deficient, insulin resistant, and chronically inflamed.\n\nThe reason she felt awful was not psychological. It was metabolic. Six different markers were off.\n\n## The Sequenced Plan\n\n**Phase M first (Weeks 1 to 8).** Iron protocol to bring ferritin up. Vitamin D loading dose followed by maintenance. B-complex with methylated forms. CoQ10. Selenium and zinc for thyroid conversion. Selenium also helps lower TPO antibodies.\n\nWe did NOT change the thyroid medication yet. That was a conversation for after the floor was rebuilt.\n\nBy Week 6 she had energy in the morning. The afternoon crash was lighter. Her hair had stopped falling out as much.\n\n**Phase A added (Weeks 6 to 16).** Gluten and dairy removed for 90 days minimum. Gut healing protocol with L-glutamine and zinc carnosine. Sluggish bile addressed with bitter herbs and TUDCA. GI-MAP run to check for hidden infections. (It showed mild SIBO and we addressed it.)\n\nBy Week 14 her bloating was gone. Her skin had cleared. Her brain fog had lifted significantly.\n\n**Phase R running parallel.** Magnesium glycinate PM. Phosphatidylserine for evening cortisol. Sleep hygiene. Morning sunlight. Walking after dinner.\n\nBy Week 16 her sleep was solid. She was waking refreshed for the first time in years.\n\n**Phase C started at Week 16.** Her cycle had regulated by then. Free T3 had climbed. Reverse T3 had dropped. TPO antibodies had come down from 380 to 215. We had a conversation with her physician about adjusting medication. She moved from levothyroxine to a combined T4 plus T3 protocol. Energy and warmth came back further.\n\n**Phase H began at Week 24.** Resistance training 3 days a week. Walking. Real food. Her body composition shifted without aggressive dieting. Down 18 pounds by Month 8. Not all the weight, but the right kind of loss: fat, not lean tissue.\n\n## Where Sarah Is Now\n\nAt 18 months, TPO antibodies are under 100 (down from 380). TSH is 1.4. Free T3 is upper-third. Ferritin is 95. Vitamin D is 65. Fasting insulin is 4. Hs-CRP is 0.6.\n\nShe has lost 26 pounds total. Her cycle is regular. Her hair has thickened. Her afternoon crashes are gone. Her energy holds through the day. Her mood is stable.\n\nShe did not need an antidepressant. She needed a sequenced rebuild.\n\n## What This Case Shows\n\nHashimoto's is reversible at the activity level. The antibodies will come down with the right work. The thyroid does not heal back to normal but the inflammatory attack can be quieted, the conversion can be optimized, and the case can become a non-issue for daily life.\n\nThe order matters. Iron and Phase M came first. The hormones did not start to move until the floor was stable. If we had jumped to a medication change in Week 1, it would not have held.\n"}, {"id": "case-maria", "library": "Cases", "cluster": "Real Recoveries", "title": "Maria · Perimenopause + Weight", "subtitle": "44, weight crept up 30 pounds, sleep broken, mood erratic, period unpredictable. How the case rebuilt.", "phase": "MARCH", "readTime": 5, "content": "\n*Anonymized composite based on real client work.*\n\nMaria came in at 44. Her weight had gone up 30 pounds over the past 3 years despite no change in her eating. She was sleeping 6 to 7 hours but waking at 3 AM and not getting back to sleep. Her mood was erratic, especially the week before her period. Her cycle was inconsistent, sometimes 24 days, sometimes 38. She was exhausted by 2 PM. Her OB told her she was \"premenopausal\" and offered birth control to regulate the cycle.\n\nShe wanted answers, not a band-aid.\n\n## The Workup\n\n- Day 21 progesterone: 4.2 (low, often under-ovulating)\n- Estradiol: 312 (top of range)\n- FSH: 12 (climbing, perimenopause signal)\n- Free T3: low-mid range\n- TSH: 3.1\n- TPO: borderline (likely early Hashimoto's pattern)\n- Ferritin: 35\n- Fasting insulin: 14\n- HbA1c: 5.6\n- Hs-CRP: 2.4\n- DUTCH test: estrogen detox skewed toward 4-OH (less safe metabolite)\n\nThis was a classic perimenopause picture stacked with insulin resistance, mild thyroid issues, and an estrogen detox problem.\n\n## The Sequenced Plan\n\n**Phase M (Weeks 1 to 8).** Iron, B-complex, CoQ10. Vitamin D loading. Selenium for thyroid. The energy floor came up first.\n\n**Phase A added (Weeks 6 onward).** Estrogen detox stack: DIM, calcium D-glucarate, sulforaphane, NAC, TUDCA. Daily bowel movements protected. Cruciferous vegetables every day. Removed alcohol entirely.\n\n**Phase R parallel.** Sleep priority. Magnesium glycinate PM. Phosphatidylserine. Morning sunlight. Phone out of bedroom. Walking after dinner.\n\nBy Week 8 her energy held through the afternoon. By Week 12 her sleep was solid again. The 3 AM wakeups had stopped.\n\n**Phase C (Week 12 onward).** Progest-E in the luteal phase to support progesterone. After 2 cycles of Progest-E, the PMS had quieted. After 3 cycles, the luteal phase felt like the rest of the month.\n\nWe did not start HRT at this point. The symptoms had quieted enough on functional work that she did not need it yet.\n\n**Phase H (Week 20 onward).** Resistance training added: 3 heavy strength days, 2 zone 2 cardio days, 2 walking-only days. Protein target raised to 130 grams a day. Body composition shifted.\n\n## Where Maria Is Now\n\nAt 12 months: down 22 pounds. Cycle regular at 28 to 30 days. PMS is mild. Sleep is consistent. Energy holds. Her mood feels like herself again.\n\nFree T3 is upper-third. Ferritin is 88. Fasting insulin is 5. Hs-CRP is 0.7. Day 21 progesterone is 12 (up from 4.2). The DUTCH detox metabolites shifted toward 2-OH (safer pathway).\n\nShe will eventually need to revisit hormones as she moves toward menopause. By then, the foundation is solid. The transition will be smooth.\n\n## What This Case Shows\n\nPerimenopause is a window, not a sentence. The symptoms respond to the right work, in the right order. Most cases do not need HRT in the early perimenopause window if the upstream work is done well.\n\nThe conventional approach (offer birth control to mask symptoms) misses the opportunity to set up a graceful transition. The functional approach takes longer but the gains last.\n"}, {"id": "case-jen", "library": "Cases", "cluster": "Real Recoveries", "title": "Jen · Gut + Autoimmune Recovery", "subtitle": "32, IBS for 8 years, rosacea, joint pain, antibiotic-resistant. The gut-autoimmune connection.", "phase": "AR", "readTime": 5, "content": "\n*Anonymized composite based on real client work.*\n\nJen came in at 32. She had been diagnosed with IBS at 24 after a gastrointestinal infection during a trip overseas. Since then she had progressive symptoms: bloating after almost every meal, alternating constipation and diarrhea, intense food sensitivities, rosacea that flared with anything inflammatory, joint pain in her hands and ankles, brain fog, anxiety, and chronic fatigue.\n\nShe had done three rounds of rifaximin for SIBO over 4 years. Each round helped for a few months, then relapsed. She had been on a low-FODMAP diet for 3 years and her diet kept getting more restrictive as new sensitivities developed.\n\nShe felt like she was running out of foods she could tolerate.\n\n## The Workup\n\n- GI-MAP showed: elevated Klebsiella, low Akkermansia and Faecalibacterium (commensals), low pancreatic elastase (digestive enzyme insufficiency), low secretory IgA, mild calprotectin elevation (gut inflammation)\n- Lactulose breath test: positive hydrogen SIBO, plus methane elevated\n- Zonulin: elevated (intestinal permeability)\n- ANA: weakly positive\n- Hs-CRP: 4.8\n- TPO: 95 (early Hashimoto's pattern)\n- Ferritin: 28\n- Vitamin D: 24\n- Full thyroid: TSH 3.4, Free T3 low\n\nShe had:\n- Persistent SIBO with two types\n- Pathogen pressure (Klebsiella)\n- Leaky gut\n- Early autoimmune signaling\n- Digestive enzyme insufficiency\n- Nutrient deficiencies\n- Sluggish thyroid\n\nThe IBS diagnosis 8 years earlier had been the start, not the explanation.\n\n## The Plan\n\n**Pre-kill prep (Weeks 1 to 3).** Bile flow support (bitter herbs, TUDCA). Digestive enzyme support at meals. Stress and sleep work. Iron and vitamin D started. The system needed to be ready for kill phase.\n\n**Kill phase (Weeks 4 to 10).** Targeted antimicrobials for both hydrogen SIBO and methane. Allicin, oregano, neem, berberine in a rotating protocol. Binders to capture die-off. Liver support throughout (silymarin, glutathione, NAC).\n\nWe did not use rifaximin again. The previous rounds had not held and we wanted a different approach.\n\n**Rebuild (Weeks 10 to 20).** Gut lining repair: L-glutamine, zinc carnosine, slippery elm, marshmallow root. Beneficial bacteria, starting with Saccharomyces boulardii in the early phase, then bifido and lacto strains. Prokinetic agent to maintain motility. Continued enzyme support.\n\n**Phase R running parallel.** Magnesium, ashwagandha, sleep protection, walking after meals. Vagus nerve work (humming, breathwork).\n\n**Phase C at Week 20.** Thyroid optimization conversation. Hashimoto's antibodies came down on the gut work alone (from 95 to 32) so the autoimmune component was already calming.\n\n## Where Jen Is Now\n\nAt 14 months: no bloating, daily formed bowel movements, rosacea cleared, joint pain gone, brain fog lifted, energy stable, mood improved.\n\nRepeat breath test at Month 6 was negative. At Month 12 still negative. She reintroduced almost all foods. The list of intolerances dropped from 30+ foods to about 4 (still avoids gluten, dairy, and high-histamine in large amounts, and occasionally reacts to soy).\n\nTPO is now 18. ANA is negative. Hs-CRP is 0.5. Ferritin is 95. Free T3 is upper-third. She has not needed thyroid medication.\n\n## What This Case Shows\n\nSIBO that keeps relapsing is not \"incurable.\" It is a case where the upstream drivers (motility, bile, immune function, infection load) were not addressed in previous rounds. Once they are, the protocol holds.\n\nThe autoimmune signals (rosacea, early Hashimoto's pattern, joint pain) calmed as the gut healed. Not because we treated them directly. Because the leaky gut had been feeding the immune system foreign material for years and that was the engine.\n\nMost autoimmune cases benefit dramatically from gut work even if the gut is not the obvious complaint.\n"}, {"id": "case-lisa", "library": "Cases", "cluster": "Real Recoveries", "title": "Lisa · Postpartum and Fertility Prep", "subtitle": "39, 18 months postpartum, second pregnancy planned, exhausted, weight not moving, cycle wrong.", "phase": "MARC", "readTime": 5, "content": "\n*Anonymized composite based on real client work.*\n\nLisa came in at 39. Her son was 18 months old. She had not lost the baby weight (35 pounds over pre-pregnancy). Her cycle had returned at 12 months postpartum but was irregular and PMS was severe. She and her husband wanted a second child but she felt nowhere near ready. Her energy was shot. Her sleep was bad even when the baby slept through. Her hair was falling out.\n\nShe wanted to feel like herself again AND prepare her body for a second pregnancy.\n\n## The Workup\n\n- Ferritin: 18 (severe iron deficiency)\n- Hemoglobin: 11.8 (anemic)\n- Vitamin D: 22\n- TSH: 4.1 (suggests postpartum thyroiditis pattern)\n- Free T3: bottom of range\n- TPO antibodies: 145\n- Day 21 progesterone: 3.8 (low)\n- Estradiol: low-mid range\n- DHEA-S: low\n- Fasting insulin: 9\n- Omega-3 index: 3.8% (low, healthy is 8+)\n- Folate (RBC): mid-range\n- B12: low-mid range\n\nShe was iron-deficient anemic, vitamin D deficient, in early Hashimoto's pattern from postpartum thyroiditis, low progesterone, low DHEA, mild insulin resistance, and deficient in omega-3s.\n\nThis is a textbook postpartum picture and it was all missed by standard care.\n\n## The Plan\n\n**Phase M priority (Weeks 1 to 12).** Iron protocol. Iron is the cornerstone here. We used heme iron + vitamin C. Hemoglobin and ferritin both began climbing. Vitamin D loading dose. Methylated B-complex. Omega-3 supplement at therapeutic dose. CoQ10. Selenium for thyroid.\n\nBy Week 8 her energy had returned. Hair shedding slowed. Sleep improved.\n\n**Phase A added (Weeks 8 onward).** Gluten removed (with Hashimoto's pattern, this matters). Gut support: L-glutamine, S. boulardii. Daily bowel movements priority. Liver flow support.\n\nBy Week 16 her digestion was solid.\n\n**Phase R parallel.** Magnesium PM. Sleep priority. Walking outside daily. Cortisol rhythm support.\n\n**Phase C (Week 16 onward).** Progest-E in luteal phase. Vitex carefully (we held off until Hashimoto's status was confirmed quiet). DHEA at low dose.\n\nBy cycle 4 of Progest-E, her PMS had quieted. Cycle was regular at 28 to 29 days. Day 21 progesterone climbed to 14.\n\n**Fertility prep (Month 6 onward).** With the floor rebuilt, we shifted into fertility-specific work. Prenatal with the right forms of folate (methylfolate, not synthetic folic acid since she has a methylation pattern). Choline. Iodine carefully. Egg quality support (CoQ10 at higher dose, omega-3, antioxidants). Sperm support for her husband as well.\n\n## Where Lisa Is Now\n\nAt Month 10: weight down 22 pounds. Cycle regular. PMS minimal. Energy stable. Hair regrown. TPO antibodies at 42 (down from 145). Free T3 upper-third. Ferritin 110. Vitamin D 68. Omega-3 index 9.4%.\n\nShe conceived at Month 12. Carried to term without complications. Postpartum recovery the second time was dramatically smoother than the first because the underlying floor was solid going in.\n\n## What This Case Shows\n\nPostpartum bodies need targeted support that most physicians do not run. Iron is the first thing. Thyroid is the second. Hormones are the third. Many women never get any of this and feel awful for years.\n\nFertility prep is most effective when run alongside the foundational work. You cannot simultaneously rebuild a depleted body and grow a baby optimally. The 3 to 6 months of upstream work pays dividends into the next pregnancy and the next postpartum.\n\nIf you are postpartum and feel like you are not bouncing back, the workup is not optional. The labs tell the story your tiredness cannot articulate.\n"}]</script>

 1, "explanation": "T4 is the storage hormone. T3 is the active hormone. Conversion requires selenium, zinc, iron, and a healthy stress profile. Many cases have plenty of T4 and feel hypothyroid because T3 is not getting made."}, {"category": "Energy + Mitochondria", "q": "Which iron marker tells you about your iron stockpile?", "options": ["Hemoglobin", "Ferritin", "Vitamin D", "TSH"], "answer": 1, "explanation": "Ferritin is the storage marker. Hemoglobin only drops after iron stores have been depleted for years. By the time hemoglobin shows iron deficiency anemia, ferritin has been low for a long time."}, {"category": "Energy + Mitochondria", "q": "What is the adrenal pattern called when cortisol is high in the morning, then crashes in the afternoon?", "options": ["Flat all day", "Wrong-way curve", "Pattern 1: Wired AM, crashed PM", "Cushing's"], "answer": 2, "explanation": "Pattern 1 is high AM, crashed by 2 PM. Usually HPA overactive in the morning. Common in driven, high-achieving clients with chronic overstimulation."}, {"category": "Weight + Metabolism", "q": "What hormone primarily decides whether fat is stored or mobilized?", "options": ["Testosterone", "Cortisol", "Insulin", "Estrogen"], "answer": 2, "explanation": "Insulin is the storage decision hormone. When insulin stays elevated, fat cannot mobilize. You can be in a caloric deficit and not lose fat because the storage decision is locked."}, {"category": "Weight + Metabolism", "q": "Why does cutting calories often stop working over time?", "options": ["You are not cutting enough", "The body adapts: metabolic rate drops, thyroid output falls, cortisol elevates, hunger hormones rise", "Calorie counting is fake", "Insulin resistance gets worse with eating less"], "answer": 1, "explanation": "Metabolic adaptation. The body defends itself against perceived scarcity. Pushing harder digs the plateau deeper. The fix is a metabolic reset, not more deficit."}, {"category": "Weight + Metabolism", "q": "Fat sitting stubbornly on hips, thighs, and lower belly is most associated with what?", "options": ["High testosterone", "Estrogen dominance", "Low cortisol", "Low protein intake"], "answer": 1, "explanation": "Estrogen drives storage in those areas in women. Body fat also makes estrogen via aromatase, creating a loop. Estrogen dominance often shows up in perimenopause, postpartum, post-pill, or with stress."}, {"category": "Gut + Digestion", "q": "What is SIBO?", "options": ["A pathogen", "Small intestinal bacterial overgrowth", "A parasite", "A vitamin deficiency"], "answer": 1, "explanation": "Small Intestinal Bacterial Overgrowth. Bacteria that belong in the colon end up in the small intestine and ferment food before you absorb it."}, {"category": "Gut + Digestion", "q": "Why do SIBO cases relapse so often after antimicrobial treatment?", "options": ["The bacteria are immortal", "The upstream driver was not addressed (motility, bile, low acid)", "Antimicrobials are weak", "Treatment was too long"], "answer": 1, "explanation": "Most relapse cases skipped the upstream work. Low stomach acid, sluggish bile, slow motility, hypothyroid. Without those addressed, the bacteria return."}, {"category": "Gut + Digestion", "q": "What is leaky gut a sign of?", "options": ["A made-up condition", "Tight junctions in the gut lining loosened, allowing food and bacterial fragments into the bloodstream", "A vitamin K deficiency", "Too much fiber intake"], "answer": 1, "explanation": "Intestinal permeability. The tight junctions become loose and let partially digested food, bacterial fragments, and toxins into the bloodstream. The immune system mounts a chronic response. Now well-documented in research."}, {"category": "Hormones", "q": "When does perimenopause typically start?", "options": ["At menopause when periods stop", "Mid-50s usually", "As early as 35", "Only after age 50"], "answer": 2, "explanation": "Perimenopause can start as early as 35. The label gets applied at the end of the   for (const clusterName of clusters) {
    const docsInCluster = libDocs.filter(d => d.cluster === clusterName);
    if (docsInCluster.length === 0) continue;
    const heading = document.createElement('div');
    heading.className = 'cluster-name';
    heading.textContent = clusterName;
    tree.appendChild(heading);
    for (const doc of docsInCluster) {
      const link = document.createElement('a');
      link.className = 'doc-link';
      link.dataset.id = doc.id;
      const readMin = doc.readTime ? ` · ${doc.readTime} min read` : '';
      link.innerHTML = `<span class="doc-link-title">${doc.title}</span><span class="doc-link-meta">${doc.phase || 'overview'}${readMin}</span>`;
      link.addEventListener('click', () => openDoc(doc.id));
      tree.appendChild(link);
    }
  }
}

function openDoc(id) {
  activeDocId = id;
  const doc = DOCS.find(d => d.id === id);
  if (!doc) return;
  if (doc.library !== activeLibrary) {
    activeLibrary = doc.library;
    buildLibTabs();
    buildSidebar();
  }
  document.querySelectorAll('.doc-link').forEach(el => el.classList.toggle('active', el.dataset.id === id));

  if (doc.kind === 'phase-quiz') {
    renderPhaseQuiz();
    return;
  }
  if (doc.kind === 'knowledge-quiz') {
    renderKnowledgeQuiz();
    return;
  }
  if (doc.kind === 'fit-quiz') {
    renderFitQuiz();
    return;
  }

  const phaseTag = doc.phase ? `<span class="tag phase">${doc.phase}</span>` : '';
  const timeTag = doc.readTime ? `<span class="tag time">${doc.readTime} min read</span>` : '';
  const subtitle = doc.subtitle ? `<div class="doc-subtitle">${doc.subtitle}</div>` : '';
  const renderedContent = marked.parse(doc.content);
  document.getElementById('main').innerHTML = `
    <div class="breadcrumb">${doc.library} · ${doc.cluster}</div>
    <h1 class="doc-title">${doc.title}</h1>
    ${subtitle}
    <div class="doc-meta">
      ${timeTag}
      ${phaseTag}
    </div>
    <div class="content">${renderedContent}</div>
    ${ctaHTML(doc)}
  `;
  window.scrollTo({top: 0, behavior: 'instant'});
}

function ctaHTML(doc) {
  return `
    <div class="cta-bottom">
      <div class="cta-lead">Where this leads</div>
      <h3>This is the map. Your case needs the route.</h3>
      <p>Foundations gives you the framework. 1:1 coaching builds the protocol around your case. If you have read three or four of these and you know the framework fits but you don't know where to start, book a discovery call.</p>
      <a class="cta-btn" href="${APPLY_URL}" target="_blank" rel="noopener">Apply for 1:1 Coaching</a>
    </div>`;
}

// PHASE QUIZ
function renderPhaseQuiz() {
  currentQuiz = PHASE_QUIZ;
  currentQuestionIdx = 0;
  quizScores = { M: 0, A: 0, R: 0, C: 0, H: 0 };
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="breadcrumb">Start Here · Phase Quiz</div>
    <h1 class="doc-title">Find Your Phase</h1>
    <div class="doc-subtitle">Twenty questions. We'll show you which phase of MARCH your case likely lives in and what that means.</div>
    <div id="quiz-container"></div>
  `;
  renderQuizQuestion();
  window.scrollTo({top: 0, behavior: 'instant'});
}

function renderQuizQuestion() {
  const container = document.getElementById('quiz-container');
  if (currentQuestionIdx >= currentQuiz.questions.length) {
    renderQuizResult();
    return;
  }
  const q = currentQuiz.questions[currentQuestionIdx];
  let selected = null;
  const optionsHTML = q.options.map((opt, i) => `<button class="quiz-option" data-idx="${i}">${opt.text}</button>`).join('');
  container.innerHTML = `
    <div class="quiz-panel">
      <div class="quiz-progress">Question ${currentQuestionIdx + 1} of ${currentQuiz.questions.length}</div>
      <div class="quiz-question">${q.q}</div>
      <div class="quiz-options" id="quiz-options">${optionsHTML}</div>
      <div class="quiz-actions">
        <button class="btn" id="next-btn" disabled>Next</button>
      </div>
    </div>
  `;
  container.querySelectorAll('.quiz-option').forEach(btn => {
    btn.addEventListener('click', () => {
      container.querySelectorAll('.quiz-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selected = parseInt(btn.dataset.idx);
      document.getElementById('next-btn').disabled = false;
    });
  });
  document.getElementById('next-btn').addEventListener('click', () => {
    if (selected === null) return;
    const phaseScores = q.options[selected].phases || {};
    for (const phase in phaseScores) quizScores[phase] += phaseScores[phase];
    currentQuestionIdx++;
    renderQuizQuestion();
  });
}

function renderQuizResult() {
  const phaseDescriptions = {
    M: { name: 'Mitochondria', text: 'Your case likely lives in Phase M. Your energy floor is the limiting factor right now. Symptoms in this phase: tired after a full night of sleep, dependent on caffeine, foggy in the morning, crashing in the afternoon, cold hands and feet. The fix here is restoring the cellular fuel system before anything else gets layered on top. Iron, B-complex, CoQ10, mitochondrial-supporting peptides like MOTS-C in some cases. If you start with hormones or fat loss before Phase M is stable, the work does not hold.' },
    A: { name: 'Absorption + Detox', text: 'Your case likely lives in Phase A. Your gut and liver are the layer keeping everything else stuck. Bloating, irregular digestion, food sensitivities, reflux, brain fog after meals, sluggish bowels. You cannot supplement your way out of poor absorption. Phase A work is gut repair, bile flow, liver Phase 1+2 detox, and sometimes pathogen clearance. After this phase, hormones rebalance more easily and inflammation drops.' },
    R: { name: 'Resilience', text: 'Your case likely lives in Phase R. Your nervous system is dysregulated and cortisol rhythm is broken. Wired but tired, 3 AM wakeups, racing heart at rest, irritability you cannot explain, mood swings. Most clients here have lived in survival mode for years. The fix is nervous system regulation, cortisol rhythm restoration, sleep architecture rebuild, and inflammation reduction. Without this layer stable, hormonal work amplifies instability.' },
    C: { name: 'Cycle + Signal', text: 'Your case likely lives in Phase C. Your hormones, thyroid, and signaling axes are the primary issue. Irregular cycles, PMS that takes you out, low thyroid signal even on medication, low libido, hormonal weight gain, hot flashes, brain fog. This is where most other coaches START. We only start here once the floor is stable. Anything we do at the hormone level on a broken floor comes undone. Phase C work is targeted endocrine support after M, A, and R are addressed.' },
    H: { name: 'Healthspan + Strength', text: 'Your case is moving toward Phase H. The underlying system is working. Now we periodize training, refine nutrition, build lean tissue, and protect long-term health. Phase H is the result of the rebuild, not the starting point. If you are here, the work is to maintain what you earned and push performance and longevity from a stable base.' }
  };
  let topPhase = 'M';
  let topScore = -1;
  for (const p in quizScores) { if (quizScores[p] > topScore) { topScore = quizScores[p]; topPhase = p; } }
  const desc = phaseDescriptions[topPhase];
  document.getElementById('quiz-container').innerHTML = `
    <div class="phase-result">
      <div class="phase-result-label">Your Likely Phase</div>
      <div class="phase-result-letter">${topPhase}</div>
      <div class="phase-result-name">${desc.name}</div>
      <div class="phase-result-text">${desc.text}</div>
      <div class="phase-result-actions">
        <a class="btn" href="${APPLY_URL}" target="_blank" rel="noopener">Talk To Coach Farren</a>
        <button class="btn" style="background: var(--warm-brown);" onclick="renderPhaseQuiz()">Retake Quiz</button>
      </div>
    </div>
    <div style="margin-top: 32px; text-align: center; font-size: 13px; color: var(--text-soft); font-style: italic;">
      This is an indicator, not a diagnosis. The same symptom can live in two phases at once. A real case build is a lab review plus a conversation with Coach Farren.
    </div>
  `;
}


// KNOWLEDGE QUIZ
let knQuiz = { idx: 0, score: 0, byCategory: {}, totalByCategory: {}, selected: null };
function renderKnowledgeQuiz() {
  knQuiz = { idx: 0, score: 0, byCategory: {}, totalByCategory: {}, selected: null };
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="breadcrumb">Quizzes \u00b7 Knowledge Check</div>
    <h1 class="doc-title">Test Your Knowledge</h1>
    <div class="doc-subtitle">Twenty-five questions across the library. See how much of the framework you have internalized and where to read next.</div>
    <div id="kn-container"></div>
  `;
  renderKnQuestion();
  window.scrollTo({top: 0, behavior: 'instant'});
}

function renderKnQuestion() {
  const container = document.getElementById('kn-container');
  if (knQuiz.idx >= KN_QUIZ.questions.length) { renderKnResult(); return; }
  const q = KN_QUIZ.questions[knQuiz.idx];
  knQuiz.selected = null;
  const optionsHTML = q.options.map((opt, i) => `<button class="quiz-option" data-idx="${i}">${opt}</button>`).join('');
  container.innerHTML = `
    <div class="quiz-panel">
      <div class="quiz-progress">Question ${knQuiz.idx + 1} of ${KN_QUIZ.questions.length} \u00b7 Score ${knQuiz.score}</div>
      <div class="quiz-question">${q.q}</div>
      <div class="quiz-options" id="kn-options">${optionsHTML}</div>
      <div class="quiz-actions">
        <button class="btn" id="kn-check" disabled>Check Answer</button>
      </div>
    </div>
  `;
  container.querySelectorAll('.quiz-option').forEach(btn => {
    btn.addEventListener('click', () => {
      container.querySelectorAll('.quiz-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      knQuiz.selected = parseInt(btn.dataset.idx);
      document.getElementById('kn-check').disabled = false;
    });
  });
  document.getElementById('kn-check').addEventListener('click', () => {
    const opts = container.querySelectorAll('.quiz-option');
    opts.forEach((btn, i) => {
      btn.disabled = true;
      if (i === q.answer) btn.classList.add('correct');
      else if (i === knQuiz.selected && i !== q.answer) btn.classList.add('incorrect');
    });
    const correct = knQuiz.selected === q.answer;
    if (correct) knQuiz.score++;
    knQuiz.totalByCategory[q.category] = (knQuiz.totalByCategory[q.category] || 0) + 1;
    if (correct) knQuiz.byCategory[q.category] = (knQuiz.byCategory[q.category] || 0) + 1;
    const actions = container.querySelector('.quiz-actions');
    if (q.explanation) {
      const exp = document.createElement('div');
      exp.className = 'quiz-explanation';
      exp.innerHTML = `<strong>${correct ? 'Right.' : 'Not quite.'}</strong> ${q.explanation}`;
      actions.parentElement.insertBefore(exp, actions);
    }
    actions.innerHTML = `<button class="btn" id="kn-next">${knQuiz.idx + 1 >= KN_QUIZ.questions.length ? 'See Results' : 'Next Question'}</button>`;
    document.getElementById('kn-next').addEventListener('click', () => { knQuiz.idx++; renderKnQuestion(); });
  });
}

function renderKnResult() {
  const pct = Math.round(knQuiz.score / KN_QUIZ.questions.length * 100);
  let headline, text, recommend;
  if (pct >= 80) {
    headline = 'You have internalized the framework.';
    text = 'You can articulate the MARCH method, you understand where your case likely lives, and you can read your symptoms as signals. This level of literacy is the bridge into 1:1 work. If you have read the library and you know the framework fits but you do not know exactly where to start, that is the signal that coaching is the right next step.';
    recommend = { strong: 'Next step', text: 'Book a discovery call with Coach Farren. The library has given you the map. Coaching builds the route.' };
  } else if (pct >= 55) {
    headline = 'Solid grasp of the framework.';
    text = 'You understand the major moves and the order of operations. There are gaps worth closing, especially in your weaker categories below. Re-read the docs in those areas, retake the quiz in a week, and you will see the difference.';
    recommend = { strong: 'Next step', text: 'Re-read the docs in your weaker categories, then take this quiz again. If you score 80+ on the retake, you are ready for a discovery call.' };
  } else {
    headline = 'You are early in the learning curve. That is fine.';
    text = 'The framework is a lot to absorb the first time through. Most of your gaps are in the foundation docs. Going back through Start Here and the MARCH Method doc gives you the anchor for everything else.';
    recommend = { strong: 'Next step', text: 'Re-read Start Here in full, then take the Phase Quiz. Once you can identify your phase confidently, the rest of the library clicks into place.' };
  }
  let breakdownHTML = '';
  for (const cat in knQuiz.totalByCategory) {
    const correct = knQuiz.byCategory[cat] || 0;
    const total = knQuiz.totalByCategory[cat];
    const catPct = Math.round(correct / total * 100);
    breakdownHTML += `<div class="kn-cat"><span class="kn-cat-name">${cat}</span><div class="kn-cat-bar"><div class="kn-cat-fill" style="width: ${catPct}%"></div></div><span class="kn-cat-pct">${correct}/${total}</span></div>`;
  }
  document.getElementById('kn-container').innerHTML = `
    <div class="kn-result">
      <div class="kn-result-score">
        <div class="kn-result-pct">${pct}%</div>
        <div class="kn-result-label">${knQuiz.score} of ${KN_QUIZ.questions.length} correct</div>
        <div class="kn-result-headline">${headline}</div>
        <div class="kn-result-text">${text}</div>
      </div>
      <div class="kn-breakdown">
        <div class="kn-breakdown-title">Breakdown by category</div>
        ${breakdownHTML}
      </div>
      <div class="kn-recommend"><strong>${recommend.strong}</strong>${recommend.text}</div>
      <div style="margin-top: 24px; text-align: center; display: flex; gap: 10px; justify-content: center;">
        <a class="btn" href="${APPLY_URL}" target="_blank" rel="noopener">Book Discovery Call</a>
        <button class="btn" style="background: var(--warm-brown);" onclick="renderKnowledgeQuiz()">Retake</button>
      </div>
    </div>
  `;
}

// FIT QUIZ
let fitQuiz = { idx: 0, score: 0, flags: {}, selected: null };
function renderFitQuiz() {
  fitQuiz = { idx: 0, score: 0, flags: {}, selected: null };
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="breadcrumb">Quizzes \u00b7 Coaching Fit Check</div>
    <h1 class="doc-title">Are You A Fit For 1:1 Coaching?</h1>
    <div class="doc-subtitle">Twelve honest questions. We will tell you whether 1:1 is the right next step for you right now, and if not, what to do instead.</div>
    <div id="fit-container"></div>
  `;
  renderFitQuestion();
  window.scrollTo({top: 0, behavior: 'instant'});
}

function renderFitQuestion() {
  const container = document.getElementById('fit-container');
  if (fitQuiz.idx >= FIT_QUIZ.questions.length) { renderFitResult(); return; }
  const q = FIT_QUIZ.questions[fitQuiz.idx];
  fitQuiz.selected = null;
  const optionsHTML = q.options.map((opt, i) => `<button class="quiz-option" data-idx="${i}">${opt.text}</button>`).join('');
  container.innerHTML = `
    <div class="quiz-panel">
      <div class="quiz-progress">Question ${fitQuiz.idx + 1} of ${FIT_QUIZ.questions.length}</div>
      <div class="quiz-question">${q.q}</div>
      <div class="quiz-options" id="fit-options">${optionsHTML}</div>
      <div class="quiz-actions">
        <button class="btn" id="fit-next" disabled>Next</button>
      </div>
    </div>
  `;
  container.querySelectorAll('.quiz-option').forEach(btn => {
    btn.addEventListener('click', () => {
      container.querySelectorAll('.quiz-option').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      fitQuiz.selected = parseInt(btn.dataset.idx);
      document.getElementById('fit-next').disabled = false;
    });
  });
  document.getElementById('fit-next').addEventListener('click', () => {
    if (fitQuiz.selected === null) return;
    const opt = q.options[fitQuiz.selected];
    fitQuiz.score += (opt.score || 0);
    if (opt.flag) fitQuiz.flags[opt.flag] = true;
    fitQuiz.idx++;
    renderFitQuestion();
  });
}

function renderFitResult() {
  let kind, label, headline, text, actionsHTML;
  // Hard disqualifiers first
  if (fitQuiz.flags.pregnant) {
    kind = 'hold';
    label = 'Right now is not the moment';
    headline = "Let's circle back postpartum.";
    text = 'Coach Farren does not coach pregnant clients. Pregnancy is its own physiological terrain and the right lane is your OB or midwife, plus a fertility-aware functional medicine doctor if you want deeper support. Once you are 3+ months postpartum and your body has stabilized, that is when this work shines. Many of our best case results are in the postpartum window. Bookmark Foundations, keep reading, and come back when the timing fits.';
    actionsHTML = `<a class="btn" href="https://wesnoskicoaching.github.io/library/" target="_blank" rel="noopener">Keep Reading Foundations</a>`;
  } else if (fitQuiz.flags.crisis) {
    kind = 'hold';
    label = 'Right now is not the moment';
    headline = "Reach out to crisis support first.";
    text = 'What you described is outside the lane of functional coaching. Acute mental health crisis needs a licensed therapist, psychiatrist, or crisis line as the first step. Once you have that support in place and you are stable, this work can be a powerful complement. The framework here will still be here when you are ready.';
    actionsHTML = `<a class="btn" href="https://988lifeline.org" target="_blank" rel="noopener">988 Suicide and Crisis Lifeline</a>`;
  } else if (fitQuiz.score >= 22) {
    kind = 'strong';
    label = 'Strong Fit';
    headline = "You are ready. The next step is a call.";
    text = "Your answers tell us you have done the upstream work. You have tried things. You know your body. You are willing to test, willing to invest, willing to do the daily work. This is exactly the type of case that thrives in 1:1 with Coach Farren. The discovery call is a conversation, not a sales pitch. We talk about your case and figure out the right protocol shape together.";
    actionsHTML = `<a class="btn primary-cta" href="${APPLY_URL}" target="_blank" rel="noopener">Book Discovery Call</a> <button class="btn" style="background: rgba(255,255,255,0.2); color: #fff;" onclick="renderFitQuiz()">Retake</button>`;
  } else if (fitQuiz.score >= 14) {
    kind = 'warm';
    label = 'Good Fit, Continue Learning';
    headline = "You are close. Read a bit more, then book.";
    text = "Your answers tell us you are interested and your case fits the framework. There are a couple of areas where reading more of the library would help you arrive at the discovery call with sharper clarity. Spend a week or two with the docs that match your strongest symptoms. Then book the call. You will get more out of the conversation when you arrive with the framework in your head.";
    actionsHTML = `<a class="btn" href="${APPLY_URL}" target="_blank" rel="noopener">Book Discovery Call Now</a> <button class="btn" style="background: var(--warm-brown);" onclick="renderFitQuiz()">Retake</button>`;
  } else {
    kind = 'warm';
    label = 'Library First';
    headline = "Spend a few weeks here before booking.";
    text = "Your answers suggest you are still mapping out what you want, what you are willing to commit to, and what you are looking for. That is fine. Most of the people who book a call with Coach Farren have read 4 to 6 docs first and have arrived at a clear question. Read at least the Start Here section in full, take the Phase Quiz, and read 2 to 3 docs that match your strongest symptoms. Come back to this quiz in a few weeks.";
    actionsHTML = `<button class="btn" onclick="switchLibrary('Start Here')">Start In Foundations</button> <button class="btn" style="background: var(--warm-brown);" onclick="renderFitQuiz()">Retake</button>`;
  }
  document.getElementById('fit-container').innerHTML = `
    <div class="fit-result ${kind}">
      <div class="fit-result-label">${label}</div>
      <div class="fit-result-headline">${headline}</div>
      <div class="fit-result-text">${text}</div>
      <div class="fit-result-actions">${actionsHTML}</div>
    </div>
    <div style="margin-top: 24px; text-align: center; font-size: 13px; color: var(--text-soft); font-style: italic;">
      This is a self-assessment to help you decide. Coach Farren reviews every application personally and makes the final call.
    </div>
  `;
}

// SEARCH
document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll('.doc-link').forEach(link => {
    const doc = DOCS.find(d => d.id === link.dataset.id);
    if (!doc) return;
    const text = (doc.title + ' ' + (doc.subtitle || '') + ' ' + doc.content).toLowerCase();
    link.style.display = (!q || text.includes(q)) ? 'flex' : 'none';
  });
});

buildLibTabs();
buildSidebar();
const start = DOCS.find(d => d.library === 'Start Here') || DOCS[0];
if (start) openDoc(start.id);
</script>
